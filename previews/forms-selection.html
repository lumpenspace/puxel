:root {
  /* ---- primitives (theme-independent) ---- */
  --px-font-display: "Press Start 2P", "Courier New", monospace;
  --px-font-body: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
  --px-font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --px-space-1: 4px;
  --px-space-2: 8px;
  --px-space-3: 12px;
  --px-space-4: 16px;
  --px-space-5: 24px;
  --px-space-6: 32px;
  --px-space-7: 48px;

  --px-border-w: 3px;
  --px-border-w-thin: 2px;
  --px-radius: 0px;

  --px-shadow-x: 4px;
  --px-shadow-y: 4px;
  --px-shadow: var(--px-shadow-x) var(--px-shadow-y) 0 0 var(--px-shadow-color);
  --px-shadow-sm: 2px 2px 0 0 var(--px-shadow-color);
  --px-shadow-lg: 8px 8px 0 0 var(--px-shadow-color);
  --px-text-shadow-color: var(--px-accent);

  /* Stepped-corner ("pixelated") geometry. Step must clear --px-border-w so
     the border's corner nub survives the clip instead of getting shaved to
     nothing; shadows on pixelated elements use the filter equivalents below
     since clip-path would otherwise cut them off entirely. */
  --px-pixel-notch: 4px;
  --px-pixel-shadow: drop-shadow(var(--px-shadow-x) var(--px-shadow-y) 0 var(--px-shadow-color));
  --px-pixel-shadow-sm: drop-shadow(2px 2px 0 var(--px-shadow-color));
  --px-pixel-shadow-lg: drop-shadow(8px 8px 0 var(--px-shadow-color));
  /* The stepped-corner silhouette as a reusable clip. Shared by .px-pixelated
     and the ::before frame of .px-card--round so both read the same geometry
     off --px-pixel-notch. */
  --px-pixel-clip: polygon(
    0 calc(var(--px-pixel-notch) * 2),

  --px-theme-swatch-paper-1: #faf3e3;
  --px-theme-swatch-paper-2: #16130d;
  --px-theme-swatch-paper-3: #ffd23f;
  --px-theme-swatch-paper-4: #ff6b35;
  --px-theme-swatch-midnight: #8b7bff;
  --px-theme-swatch-midnight-1: #0f1115;
  --px-theme-swatch-midnight-2: #f2f0e9;
  --px-theme-swatch-midnight-3: #ffd23f;
  --px-theme-swatch-midnight-4: #8b7bff;
  --px-theme-swatch-arcade: #ff4245;
  --px-theme-swatch-arcade-1: #171c48;
  --px-theme-swatch-arcade-2: #ffffff;
  --px-theme-swatch-arcade-3: #ff4245;
  --px-theme-swatch-arcade-4: #ffc93c;
  --px-theme-swatch-terminal: #33ff66;
  --px-theme-swatch-terminal-1: #060c06;
  --px-theme-swatch-terminal-2: #33ff66;
  --px-theme-swatch-terminal-3: #ffbf00;
  --px-theme-swatch-terminal-4: #1e9e44;
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --px-speed: 0ms;
  }
}

/* ==========================================================================
   THEME: paper (default light) — cream + ink, punchy accents
   ========================================================================== */
:root,
[data-theme="paper"] {
  color-scheme: light;

  --px-bg: #faf3e3;
  --px-surface: #fffdf5;
  --px-surface-2: #f3e9d2;
  --px-ink: #16130d;
  --px-ink-muted: #6b6455;
  --px-border-color: #16130d;
  --px-shadow-color: #16130d;

  --px-accent: #ffd23f;
  --px-accent-ink: #16130d;
  --px-accent-2: #ff6b35;
  --px-accent-2-ink: #16130d;

  --px-success: #00a868;
  --px-success-ink: #ffffff;
  --px-warning: #ffb02e;
  --px-warning-ink: #16130d;
  --px-danger: #ef3e36;
  --px-danger-ink: #ffffff;
  --px-info: #2d7ff9;
  --px-info-ink: #ffffff;

  --px-selection: #ffd23f;
  --px-selection-ink: var(--px-accent-ink);

  --px-score-case: var(--px-ink);
  --px-score-digit: var(--px-bg);
}

/* ==========================================================================
   THEME: midnight (dark) — near-black + off-white ink, yellow/violet neon
   ========================================================================== */
[data-theme="midnight"] {
  color-scheme: dark;

  --px-bg: #0f1115;
  --px-surface: #1a1d24;
  --px-surface-2: #242833;
  --px-ink: #f2f0e9;
  --px-ink-muted: #9a97a3;
  --px-border-color: #f2f0e9;
  --px-shadow-color: #000000;

  --px-accent: #ffd23f;
  --px-accent-ink: #16130d;
  --px-accent-2: #8b7bff;
  --px-accent-2-ink: #0f1115;

  --px-success: #3ddc84;
  --px-success-ink: #0f1115;
  --px-warning: #ffb02e;
  --px-warning-ink: #16130d;
  --px-danger: #ff5c57;
  --px-danger-ink: #0f1115;
  --px-info: #58a6ff;
  --px-info-ink: #0f1115;

  --px-selection: #8b7bff;
  --px-selection-ink: var(--px-accent-2-ink);

  --px-score-case: var(--px-bg);
  --px-score-digit: var(--px-ink);
}

/* ==========================================================================
   THEME: arcade — NES deep blue, cabinet red + coin gold
   ========================================================================== */
[data-theme="arcade"] {
  color-scheme: dark;

  --px-bg: #171c48;
  --px-surface: #212a6b;
  --px-surface-2: #2b3585;
  --px-ink: #ffffff;
  --px-ink-muted: #9aa3e0;
  --px-border-color: #ffffff;
  --px-shadow-color: #0a0d29;

  --px-accent: #ff4245;
  --px-accent-ink: #ffffff;
  --px-accent-2: #ffc93c;
  --px-accent-2-ink: #171c48;

  --px-success: #6ecb63;
  --px-success-ink: #171c48;
  --px-warning: #ffc93c;
  --px-warning-ink: #171c48;
  --px-danger: #ff4245;
  --px-danger-ink: #ffffff;
  --px-info: #4da6ff;
  --px-info-ink: #171c48;

  --px-selection: #ffc93c;
  --px-selection-ink: var(--px-accent-2-ink);

  --px-score-case: var(--px-bg);
  --px-score-digit: var(--px-ink);
}

/* ==========================================================================
   THEME: terminal — CRT phosphor green on black, amber secondary
   ========================================================================== */
[data-theme="terminal"] {
  color-scheme: dark;

  --px-bg: #060c06;
  --px-surface: #0a140a;
  --px-surface-2: #102010;
  --px-ink: #33ff66;
  --px-ink-muted: #1e9e44;
  --px-border-color: #33ff66;
  --px-shadow-color: #124d24;
  --px-text-shadow-color: #021f0b;

  --px-accent: #33ff66;
  --px-accent-ink: #060c06;
  --px-accent-2: #ffbf00;
  --px-accent-2-ink: #060c06;

  --px-success: #33ff66;
  --px-success-ink: #060c06;
  --px-warning: #ffbf00;
  --px-warning-ink: #060c06;
  --px-danger: #ff5c57;
  --px-danger-ink: #060c06;
  --px-info: #38d1ff;
  --px-info-ink: #060c06;

  --px-selection: #33ff66;
  --px-selection-ink: var(--px-accent-ink);

  --px-score-case: var(--px-bg);
  --px-score-digit: var(--px-ink);

  /* the terminal speaks mono */
  --px-font-body: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

/* ==========================================================================
   PUXEL — base + utilities
   ========================================================================== */

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--px-bg);
  color: var(--px-ink);
  font-family: var(--px-font-body);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: var(--px-selection);
  color: var(--px-selection-ink);
}

/* Every interactive element gets the same loud focus ring */
.px-focusable:focus-visible,
.px-btn:focus-visible,
.px-input:focus-visible,
.px-textarea:focus-visible,
.px-select select:focus-visible,
.px-check input:focus-visible ~ .px-check-box,
.px-radio input:focus-visible ~ .px-radio-dot,
.px-switch input:focus-visible ~ .px-switch-track,
.px-slider:focus-visible,
.px-tab:focus-visible,
.px-accordion-trigger:focus-visible,
.px-pagination-btn:focus-visible,
.px-menu-trigger:focus-visible,
.px-menu-item:focus-visible,
.px-themeswitcher-option:focus-visible {
  outline: var(--px-border-w) solid var(--px-accent-2);
  outline-offset: 2px;
}

/* ---- typography ------------------------------------------------------- */
.px-display {
  font-family: var(--px-font-display);
  line-height: 1.5;
  letter-spacing: 0;
  text-transform: uppercase;
  margin: 0;
}
.px-display--xl { font-size: 32px; }
.px-display--lg { font-size: 24px; }
.px-display--md { font-size: 16px; }
.px-display--sm { font-size: 12px; }
.px-display--xs { font-size: 9px; }

.px-label {
  font-family: var(--px-font-body);
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.px-muted { color: var(--px-ink-muted); }

.px-link {
  color: var(--px-ink);
  font-weight: 700;
  text-decoration: underline;
  text-decoration-thickness: 3px;
  text-decoration-color: var(--px-accent);
  text-underline-offset: 3px;
  transition: background var(--px-speed) var(--px-ease);
}
.px-link:hover {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  text-decoration-color: var(--px-ink);
}

/* ---- pixel corners (opt-in) -------------------------------------------
   Stepped clip-path corners: the "8-bit" silhouette without going full NES.
   The step (--px-pixel-notch) is 1px wider than --px-border-w on purpose —
   at a tight step-to-border ratio the border's corner pixel gets clipped
   away along with the notch, reading as a broken/missing border. box-shadow
   is clipped away entirely by clip-path (its offset region falls outside
   the element's own polygon), so pixelated elements use the --px-pixel-shadow-*
   filter equivalents instead — see controls.css / containers.css.
   Works on solid-bg elements: buttons, cards, figure frames, badges, chips. */
.px-pixelated {
  box-shadow: none;
  clip-path: var(--px-pixel-clip);
}

/* ---- CRT overlay (opt-in, pairs with the terminal theme) --------------- */
.px-crt {
  position: relative;
}
.px-crt::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0) 0,
    rgba(0, 0, 0, 0) 2px,
    rgba(0, 0, 0, 0.18) 2px,
    rgba(0, 0, 0, 0.18) 3px
  );
  mix-blend-mode: multiply;
}

/* ---- misc utilities ---------------------------------------------------- */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
  border: 0;
}

.px-border { border: var(--px-border-w) solid var(--px-border-color); }
.px-shadow { box-shadow: var(--px-shadow); }
.px-shadow-sm { box-shadow: var(--px-shadow-sm); }
.px-shadow-lg { box-shadow: var(--px-shadow-lg); }

.px-separator {
  border: none;
  border-top: var(--px-border-w) solid var(--px-border-color);
  margin: var(--px-space-5) 0;
}
.px-separator--dashed { border-top-style: dashed; }
.px-separator--vertical {
  display: inline-block;
  align-self: stretch;
  width: 0;
  border-top: none;
  border-left: var(--px-border-w) solid var(--px-border-color);
  margin: 0 var(--px-space-4);
}

.px-kbd {
  display: inline-block;
  padding: 2px 7px 4px;
  font-family: var(--px-font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  border-bottom-width: 4px;
  border-radius: var(--px-radius);
}

/* ==========================================================================
   PUXEL — controls: button, badge, avatar, spinner
   ========================================================================== */

/* ---- Button ------------------------------------------------------------ */
.px-btn {
  --px-btn-bg: var(--px-surface);
  --px-btn-fg: var(--px-ink);

  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--px-space-2);
  padding: 10px 18px;
  font-family: var(--px-font-body);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--px-btn-fg);
  background: var(--px-btn-bg);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow);
  cursor: var(--px-cursor-point);
  user-select: none;
  transition:
    transform var(--px-speed) var(--px-ease),
    box-shadow var(--px-speed) var(--px-ease),
    filter var(--px-speed) var(--px-ease),
    background var(--px-speed) var(--px-ease);
}
.px-btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: calc(var(--px-shadow-x) + 2px) calc(var(--px-shadow-y) + 2px) 0 0 var(--px-shadow-color);
}
.px-btn:active {
  transform: translate(var(--px-shadow-x), var(--px-shadow-y));
  box-shadow: 0 0 0 0 var(--px-shadow-color);
}
.px-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: var(--px-shadow);
}

/* box-shadow's offset region falls outside a clip-path'd element's own
   polygon, so it's simply never painted — pixelated buttons swap to the
   filter equivalent, which isn't subject to the clip. */
.px-btn.px-pixelated {
  position: relative;
  isolation: isolate;
  border: none;
  border-radius: 0;
  background: var(--px-border-color);
  box-shadow: none;
  filter: var(--px-pixel-shadow);
}
.px-btn.px-pixelated::before {
  content: "";
  position: absolute;
  inset: var(--px-border-w);
  z-index: -1;
  background: var(--px-btn-bg);
  clip-path: var(--px-pixel-clip);
  pointer-events: none;
}
.px-btn.px-pixelated:hover {
  box-shadow: none;
  filter: drop-shadow(calc(var(--px-shadow-x) + 2px) calc(var(--px-shadow-y) + 2px) 0 var(--px-shadow-color));
}
.px-btn.px-pixelated:active {
  box-shadow: none;
  filter: none;
}
.px-btn--ghost.px-pixelated {
  filter: none;
}

.px-btn--primary { --px-btn-bg: var(--px-accent); --px-btn-fg: var(--px-accent-ink); }
.px-btn--secondary { --px-btn-bg: var(--px-ink); --px-btn-fg: var(--px-bg); }
.px-btn--danger { --px-btn-bg: var(--px-danger); --px-btn-fg: var(--px-danger-ink); }
.px-btn--success { --px-btn-bg: var(--px-success); --px-btn-fg: var(--px-success-ink); }
.px-btn--ghost {
  --px-btn-bg: transparent;
  background: transparent;
  border-color: transparent;
  box-shadow: none;
}
.px-btn--ghost:hover {
  transform: none;
  box-shadow: none;
  background: var(--px-surface-2);
  border-color: var(--px-border-color);
}
.px-btn--ghost:active { transform: translate(2px, 2px); }

.px-btn--sm { padding: 6px 12px; font-size: 12px; }
.px-btn--lg { padding: 14px 26px; font-size: 16px; }
.px-btn--icon {
  width: 48px;
  min-width: 48px;
  height: 48px;
  padding: 0;
  font-size: 24px;
  line-height: 1;
}
.px-btn--icon.px-btn--sm {
  width: 40px;
  min-width: 40px;
  height: 40px;
  padding: 0;
  font-size: 20px;
}
.px-btn--icon.px-btn--lg {
  width: 58px;
  min-width: 58px;
  height: 58px;
  padding: 0;
  font-size: 30px;
}
.px-btn--icon .px-icon {
  font-size: 1.22em;
}
.px-btn.px-pixelated { padding: calc(10px + var(--px-border-w)) calc(18px + var(--px-border-w)); }
.px-btn--sm.px-pixelated { padding: calc(6px + var(--px-border-w)) calc(12px + var(--px-border-w)); }
.px-btn--lg.px-pixelated { padding: calc(14px + var(--px-border-w)) calc(26px + var(--px-border-w)); }
.px-btn--icon.px-pixelated {
  width: calc(48px + var(--px-border-w) * 2);
  min-width: calc(48px + var(--px-border-w) * 2);
  height: calc(48px + var(--px-border-w) * 2);
  padding: 0;
}
.px-btn--icon.px-btn--sm.px-pixelated {
  width: calc(40px + var(--px-border-w) * 2);
  min-width: calc(40px + var(--px-border-w) * 2);
  height: calc(40px + var(--px-border-w) * 2);
  padding: 0;
}
.px-btn--icon.px-btn--lg.px-pixelated {
  width: calc(58px + var(--px-border-w) * 2);
  min-width: calc(58px + var(--px-border-w) * 2);
  height: calc(58px + var(--px-border-w) * 2);
  padding: 0;
}

/* pixel-display variant: the loud one */
.px-btn--pixel {
  font-family: var(--px-font-display);
  font-size: 11px;
  padding: 12px 18px;
}
.px-btn--pixel.px-pixelated {
  padding: calc(12px + var(--px-border-w)) calc(18px + var(--px-border-w));
}

/* ---- Badge -------------------------------------------------------------- */
.px-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px 4px;
  font-family: var(--px-font-body);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  border-radius: var(--px-radius);
}
.px-badge--primary { background: var(--px-accent); color: var(--px-accent-ink); }
.px-badge--secondary { background: var(--px-ink); color: var(--px-bg); border-color: var(--px-border-color); }
.px-badge--success { background: var(--px-success); color: var(--px-success-ink); }
.px-badge--warning { background: var(--px-warning); color: var(--px-warning-ink); }
.px-badge--danger { background: var(--px-danger); color: var(--px-danger-ink); }
.px-badge--info { background: var(--px-info); color: var(--px-info-ink); }
.px-badge--outline { background: transparent; }
.px-badge--pixel { font-family: var(--px-font-display); font-size: 8px; padding: 5px 10px; }

/* ---- Highlight ----------------------------------------------------------- */
.px-highlight {
  --px-highlight-bg: var(--px-accent);
  --px-highlight-ink: var(--px-accent-ink);
  --px-highlight-border: var(--px-border-color);
  position: relative;
  display: inline;
  padding: 0.06em 0.28em 0.12em;
  font-family: inherit;
  font-weight: 900;
  line-height: inherit;
  color: var(--px-highlight-ink);
  background: var(--px-highlight-bg);
  border: var(--px-border-w-thin) solid var(--px-highlight-border);
  border-radius: var(--px-radius);
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}
.px-highlight--raised {
  box-shadow: 2px 2px 0 0 var(--px-shadow-color);
}
.px-highlight--info {
  --px-highlight-bg: var(--px-info);
  --px-highlight-ink: var(--px-info-ink);
}
.px-highlight--success {
  --px-highlight-bg: var(--px-success);
  --px-highlight-ink: var(--px-success-ink);
}
.px-highlight--warning {
  --px-highlight-bg: var(--px-warning);
  --px-highlight-ink: var(--px-warning-ink);
}
.px-highlight--danger {
  --px-highlight-bg: var(--px-danger);
  --px-highlight-ink: var(--px-danger-ink);
}

/* ---- Avatar -------------------------------------------------------------- */
.px-avatar {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  font-family: var(--px-font-display);
  font-size: 12px;
  text-transform: uppercase;
  color: var(--px-accent-ink);
  background: var(--px-accent);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow-sm);
  overflow: visible;
}
.px-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
}
.px-avatar--sm { width: 32px; height: 32px; font-size: 9px; }
.px-avatar--lg { width: 64px; height: 64px; font-size: 16px; }
.px-avatar-status {
  position: absolute;
  right: -6px;
  bottom: -6px;
  width: 12px;
  height: 12px;
  background: var(--px-success);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-avatar-status--away { background: var(--px-warning); }
.px-avatar-status--busy { background: var(--px-danger); }
.px-avatar-status--offline { background: var(--px-ink-muted); }

.px-avatar-group {
  display: inline-flex;
}
.px-avatar-group .px-avatar { box-shadow: none; }
.px-avatar-group .px-avatar + .px-avatar { margin-left: -10px; }
/* earlier avatars stack above later ones, so an overlapped status dot
   never gets buried under the next avatar in the row */
.px-avatar-group .px-avatar:nth-child(1) { z-index: 8; }
.px-avatar-group .px-avatar:nth-child(2) { z-index: 7; }
.px-avatar-group .px-avatar:nth-child(3) { z-index: 6; }
.px-avatar-group .px-avatar:nth-child(4) { z-index: 5; }
.px-avatar-group .px-avatar:nth-child(5) { z-index: 4; }
.px-avatar-group .px-avatar:nth-child(6) { z-index: 3; }
.px-avatar-group .px-avatar:nth-child(7) { z-index: 2; }
.px-avatar-group .px-avatar:nth-child(8) { z-index: 1; }

/* ---- Spinner (blocky, steps through quadrants) --------------------------- */
.px-spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  background: conic-gradient(
    var(--px-accent) 0 25%,
    var(--px-ink) 25% 50%,
    var(--px-accent-2) 50% 75%,
    var(--px-ink) 75% 100%
  );
  border: var(--px-border-w-thin) solid var(--px-border-color);
  animation: px-spin 0.9s steps(4) infinite;
}
.px-spinner--sm { width: 14px; height: 14px; }
.px-spinner--lg { width: 34px; height: 34px; }
@keyframes px-spin {
  to { transform: rotate(360deg); }
}
@media (prefers-reduced-motion: reduce) {
  .px-spinner { animation-duration: 2.5s; }
}

/* ---- Icon (inline pixel glyph, tints with currentColor) ------------------- */
.px-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 0;
}
.px-icon svg {
  display: block;
  width: 1em;
  height: 1em;
}
.px-icon svg path,
.px-icon svg polygon {
  fill: currentColor;
}

/* ---- Sprite avatar (animated sprite-sheet character) ----------------------
   A single cell of a sheet is stepped across the grid by shifting a background.
   In "full" mode the figure perches on the box's lower border (butt on the
   edge, legs dangling, head cresting above — overflow visible); in "face" mode
   the box clips to a static head crop. All placement is driven by the
   --px-sprite-* vars, which a consumer overrides per sheet (the cells of a
   given sheet are rarely square, so the frame keeps the real cell aspect
   ratio rather than squishing to the box). */
.px-sprite {
  position: relative;
  width: var(--px-sprite-size, 54px);
  height: var(--px-sprite-size, 54px);
  flex-shrink: 0;
  border: var(--px-border-w) solid var(--px-border-color);
  background: var(--px-surface-2);
  box-shadow: var(--px-shadow-sm);
  /* cell geometry + placement knobs (defaults suit a 192×208 cell sheet) */
  --px-sprite-cell-ar: 192 / 208;
  --px-sprite-cell-tall: 1.0833; /* cell height ÷ box width (208/192) */
  --px-sprite-seat: 0.63; /* butt line as a fraction of cell height */
  --px-sprite-scale: 1.6; /* character size relative to the box */
  --px-sprite-baseline: 0px; /* fine nudge of the seat line: +down / −up */
  --px-sprite-face-zoom: 2.5; /* head-crop zoom for face mode */
  --px-sprite-face-y: 20%; /* vertical focus point of the face crop */
  --px-sprite-flipx: 1; /* set to -1 to mirror (face the other way) */
}
.px-sprite--bare {
  border: none;
  background: none;
  box-shadow: none;
}
.px-sprite-frame {
  position: absolute;
  left: 50%;
  width: 100%;
  aspect-ratio: var(--px-sprite-cell-ar);
  background-repeat: no-repeat;
  image-rendering: pixelated;
}
.px-sprite--full { overflow: visible; }
.px-sprite--full .px-sprite-frame {
  top: calc((1 - var(--px-sprite-cell-tall) * var(--px-sprite-seat)) * 100% + var(--px-sprite-baseline));
  transform-origin: center calc(var(--px-sprite-seat) * 100%);
  transform: translateX(-50%) scale(calc(var(--px-sprite-scale) * var(--px-sprite-flipx)), var(--px-sprite-scale));
}
.px-sprite--face { overflow: hidden; }
.px-sprite--face .px-sprite-frame {
  top: 0;
  transform-origin: center var(--px-sprite-face-y);
  transform: translateX(-50%) scale(calc(var(--px-sprite-face-zoom) * var(--px-sprite-flipx)), var(--px-sprite-face-zoom));
}

/* ==========================================================================
   PUXEL — forms: input, textarea, select, checkbox, radio, switch, slider,
   fieldset (title-on-border section)
   ========================================================================== */

.px-field {
  display: flex;
  flex-direction: column;
  gap: var(--px-space-2);
}
.px-field-hint {
  font-size: 12px;
  color: var(--px-ink-muted);
}
.px-field-error {
  font-size: 12px;
  font-weight: 700;
  color: var(--px-danger);
}

/* ---- Input / Textarea ----------------------------------------------------- */
.px-input,
.px-textarea {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--px-font-body);
  font-size: 14px;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: inset 3px 3px 0 0 color-mix(in srgb, var(--px-shadow-color) 12%, transparent);
  transition: box-shadow var(--px-speed) var(--px-ease);
  cursor: var(--px-cursor-text);
}
.px-input::placeholder,
.px-textarea::placeholder {
  color: var(--px-ink-muted);
}
.px-input:focus,
.px-textarea:focus {
  outline: none;
  box-shadow: var(--px-shadow);
}
.px-input:disabled,
.px-textarea:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--px-surface-2);
}
.px-input--error,
.px-textarea--error {
  border-color: var(--px-danger);
  box-shadow: inset 3px 3px 0 0 color-mix(in srgb, var(--px-danger) 20%, transparent);
}
.px-textarea {
  min-height: 90px;
  resize: vertical;
}

/* input with attached addon (search icon, prefix, button) */
.px-input-group {
  display: flex;
  align-items: stretch;
}
.px-input-group .px-input { flex: 1; }
.px-input-group > * + * { margin-left: calc(var(--px-border-w) * -1); }
.px-input-addon {
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  font-weight: 800;
  font-size: 13px;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
}

/* ---- Select ---------------------------------------------------------------- */
.px-select {
  position: relative;
  display: inline-block;
  width: 100%;
}
.px-select select {
  width: 100%;
  padding: 10px 40px 10px 12px;
  font-family: var(--px-font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow-sm);
  appearance: none;
  cursor: var(--px-cursor-point);
}
.px-select::after {
  content: "▼";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  pointer-events: none;
  color: var(--px-ink);
}
.px-select select:focus { outline: none; }
.px-select select:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Select dropdown (options) ---------------------------------------------
   Baseline: native pickers only honour bg/color/font on <option>, so give
   them the theme's surface + ink everywhere. Browsers with customizable
   selects (appearance: base-select) get the full puxel picker: hard border,
   offset shadow, accent hover, blinking ▶ on the chosen option. */
.px-select option {
  font-family: var(--px-font-body);
  font-weight: 600;
  background: var(--px-surface);
  color: var(--px-ink);
}
@supports (appearance: base-select) {
  .px-select select,
  .px-select select::picker(select) {
    appearance: base-select;
  }
  /* base-select draws its own caret inside the button; keep the wrapper's ▼ */
  .px-select select::picker-icon {
    display: none;
  }
  .px-select select::picker(select) {
    background: var(--px-surface);
    border: var(--px-border-w) solid var(--px-border-color);
    border-radius: var(--px-radius);
    box-shadow: var(--px-shadow);
    padding: var(--px-space-1);
    margin-top: 4px;
  }
  .px-select option {
    display: flex;
    align-items: center;
    gap: var(--px-space-2);
    padding: 7px 10px;
    font-size: 13px;
    cursor: var(--px-cursor-point);
  }
  .px-select option:hover,
  .px-select option:focus-visible {
    outline: none;
    background: var(--px-accent);
    color: var(--px-accent-ink);
  }
  .px-select option:checked {
    font-weight: 800;
  }
  .px-select option::checkmark {
    content: "▶";
    font-size: 9px;
    color: var(--px-accent-2);
    animation: px-blink 1.1s steps(2) infinite;
  }
  .px-select option:hover::checkmark,
  .px-select option:focus-visible::checkmark {
    color: var(--px-accent-ink);
  }
  /* flip the wrapper's arrow while the picker is open */
  .px-select:has(select:open)::after {
    content: "▲";
  }
  @media (prefers-reduced-motion: reduce) {
    .px-select option::checkmark { animation: none; }
  }
}

/* ---- Checkbox ---------------------------------------------------------------- */
.px-check,
.px-radio,
.px-switch {
  display: inline-flex;
  align-items: center;
  gap: var(--px-space-3);
  cursor: var(--px-cursor-point);
  font-size: 14px;
  font-weight: 600;
  user-select: none;
}
.px-check input,
.px-radio input,
.px-switch input {
  position: absolute;
  opacity: 0;
  width: 1px;
  height: 1px;
}
.px-check-box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  transition: background var(--px-speed) var(--px-ease);
}
.px-check-box::after {
  content: "";
  width: 12px;
  height: 12px;
  background: var(--px-accent-ink);
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  transform: scale(0);
  transition: transform var(--px-speed) var(--px-ease);
}
.px-check input:checked ~ .px-check-box {
  background: var(--px-accent);
}
.px-check input:checked ~ .px-check-box::after {
  transform: scale(1);
}
.px-check input:disabled ~ * { opacity: 0.5; cursor: not-allowed; }

/* ---- Radio ---------------------------------------------------------------- */
.px-radio-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-radio-dot::after {
  content: "";
  width: 10px;
  height: 10px;
  background: var(--px-ink);
  transform: scale(0);
  transition: transform var(--px-speed) var(--px-ease);
}
.px-radio input:checked ~ .px-radio-dot::after { transform: scale(1); }
.px-radio input:disabled ~ * { opacity: 0.5; cursor: not-allowed; }

/* ---- Switch ---------------------------------------------------------------- */
.px-switch-track {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 26px;
  flex-shrink: 0;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  transition: background var(--px-speed) var(--px-ease);
}
.px-switch-track::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: var(--px-ink);
  transition: transform var(--px-speed) var(--px-ease);
}
.px-switch input:checked ~ .px-switch-track {
  background: var(--px-success);
}
.px-switch input:checked ~ .px-switch-track::after {
  transform: translateX(22px);
  background: var(--px-surface);
}
.px-switch input:disabled ~ * { opacity: 0.5; cursor: not-allowed; }

/* ---- Slider ---------------------------------------------------------------- */
.px-slider {
  appearance: none;
  width: 100%;
  height: 26px;
  background: transparent;
  cursor: var(--px-cursor-point);
}
.px-slider::-webkit-slider-runnable-track {
  height: 12px;
  background: var(--px-surface-2);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-slider::-webkit-slider-thumb {
  appearance: none;
  width: 22px;
  height: 22px;
  margin-top: -8px;
  background: var(--px-accent);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-slider::-moz-range-track {
  height: 12px;
  background: var(--px-surface-2);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 0;
  background: var(--px-accent);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-slider:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Fieldset: the title-on-border section (nes-ui style, modernized) ------ */
.px-fieldset {
  position: relative;
  padding: var(--px-space-5);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
}
.px-fieldset--shadow { box-shadow: var(--px-shadow); }
.px-fieldset-title {
  position: absolute;
  top: 0;
  left: var(--px-space-4);
  transform: translateY(-50%);
  padding: 2px 10px;
  font-family: var(--px-font-display);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
}
.px-fieldset-title--accent {
  background: var(--px-accent);
  color: var(--px-accent-ink);
}
.px-fieldset-title--center {
  left: 50%;
  transform: translate(-50%, -50%);
}
.px-fieldset-title--right {
  left: auto;
  right: var(--px-space-4);
}

/* ==========================================================================
   ARCADE VARIANT — "enter your initials" flavour for every form control.
   Opt in per control (arcade prop → .px-*--arcade) or put .px-arcade on any
   ancestor to flip a whole form at once. Selectors are paired accordingly.
   ========================================================================== */

.px-arcade .px-label {
  font-family: var(--px-font-display);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0;
}

/* text entry: display font, block caret, blinking placeholder */
.px-input--arcade,
.px-arcade .px-input,
.px-textarea--arcade,
.px-arcade .px-textarea {
  font-family: var(--px-font-display);
  font-size: 11px;
  line-height: 1.9;
  text-transform: uppercase;
  background: var(--px-surface-2);
  box-shadow: none;
  caret-color: var(--px-accent-2);
  caret-shape: block;
}
.px-input--arcade::placeholder,
.px-arcade .px-input::placeholder,
.px-textarea--arcade::placeholder,
.px-arcade .px-textarea::placeholder {
  animation: px-blink 1.1s steps(2) infinite;
}
.px-input--arcade:focus::placeholder,
.px-arcade .px-input:focus::placeholder,
.px-textarea--arcade:focus::placeholder,
.px-arcade .px-textarea:focus::placeholder {
  opacity: 0;
  animation: none;
}
.px-input--arcade:focus,
.px-arcade .px-input:focus,
.px-textarea--arcade:focus,
.px-arcade .px-textarea:focus {
  background: var(--px-surface);
  border-color: var(--px-accent-2);
  box-shadow: none;
}
@media (prefers-reduced-motion: reduce) {
  .px-input--arcade::placeholder,
  .px-arcade .px-input::placeholder,
  .px-textarea--arcade::placeholder,
  .px-arcade .px-textarea::placeholder {
    animation: none;
  }
}

/* select: display font on the closed control and (base-select) its options */
.px-select--arcade select,
.px-arcade .px-select select {
  font-family: var(--px-font-display);
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  line-height: 1.9;
}
@supports (appearance: base-select) {
  .px-select--arcade option,
  .px-arcade .px-select option {
    font-family: var(--px-font-display);
    font-size: 9px;
    font-weight: 400;
    text-transform: uppercase;
  }
  .px-select--arcade option:checked,
  .px-arcade .px-select option:checked {
    font-weight: 400;
    color: var(--px-accent-2);
  }
  .px-select--arcade option:hover,
  .px-arcade .px-select option:hover,
  .px-select--arcade option:focus-visible,
  .px-arcade .px-select option:focus-visible {
    color: var(--px-accent-ink);
  }
}

/* selection controls share the display-font label */
.px-check--arcade,
.px-arcade .px-check,
.px-radio--arcade,
.px-arcade .px-radio,
.px-switch--arcade,
.px-arcade .px-switch {
  font-family: var(--px-font-display);
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
}

/* checkbox: lit "LED" square instead of a checkmark tick */
.px-check--arcade .px-check-box,
.px-arcade .px-check .px-check-box {
  box-shadow: none;
  background: var(--px-surface-2);
}
.px-check--arcade .px-check-box::after,
.px-arcade .px-check .px-check-box::after {
  width: 10px;
  height: 10px;
  clip-path: none;
  background: var(--px-accent-2);
}
.px-check--arcade input:checked ~ .px-check-box,
.px-arcade .px-check input:checked ~ .px-check-box {
  background: var(--px-surface-2);
}

/* radio: the menu selector — a blinking ▶ in front of the chosen option */
.px-radio--arcade .px-radio-dot,
.px-arcade .px-radio .px-radio-dot {
  width: 16px;
  height: auto;
  justify-content: flex-start;
  border: none;
  background: none;
  box-shadow: none;
}
.px-radio--arcade .px-radio-dot::after,
.px-arcade .px-radio .px-radio-dot::after {
  content: "▶";
  width: auto;
  height: auto;
  background: none;
  color: var(--px-accent-2);
  font-size: 12px;
  line-height: 1;
  transform: none;
  opacity: 0;
  transition: opacity var(--px-speed) var(--px-ease);
}
.px-radio--arcade input:checked ~ .px-radio-dot::after,
.px-arcade .px-radio input:checked ~ .px-radio-dot::after {
  opacity: 1;
  animation: px-blink 1.1s steps(2) infinite;
}
@media (prefers-reduced-motion: reduce) {
  .px-radio--arcade input:checked ~ .px-radio-dot::after,
  .px-arcade .px-radio input:checked ~ .px-radio-dot::after {
    animation: none;
  }
}

/* switch: wider track with an ON/OFF readout */
.px-switch--arcade .px-switch-track,
.px-arcade .px-switch .px-switch-track {
  width: 64px;
}
.px-switch--arcade .px-switch-track::before,
.px-arcade .px-switch .px-switch-track::before {
  content: "OFF";
  position: absolute;
  top: 50%;
  right: 5px;
  transform: translateY(-50%);
  font-family: var(--px-font-display);
  font-size: 7px;
  color: var(--px-ink-muted);
}
.px-switch--arcade input:checked ~ .px-switch-track::before,
.px-arcade .px-switch input:checked ~ .px-switch-track::before {
  content: "ON";
  right: auto;
  left: 6px;
  color: var(--px-success-ink);
}
.px-switch--arcade input:checked ~ .px-switch-track::after,
.px-arcade .px-switch input:checked ~ .px-switch-track::after {
  transform: translateX(38px);
}

/* slider: secondary-accent thumb over a notched track */
.px-slider--arcade::-webkit-slider-runnable-track,
.px-arcade .px-slider::-webkit-slider-runnable-track {
  background: repeating-linear-gradient(
    90deg,
    var(--px-surface-2) 0 10px,
    var(--px-surface) 10px 12px
  );
}
.px-slider--arcade::-webkit-slider-thumb,
.px-arcade .px-slider::-webkit-slider-thumb {
  background: var(--px-accent-2);
}
.px-slider--arcade::-moz-range-track,
.px-arcade .px-slider::-moz-range-track {
  background: repeating-linear-gradient(
    90deg,
    var(--px-surface-2) 0 10px,
    var(--px-surface) 10px 12px
  );
}
.px-slider--arcade::-moz-range-thumb,
.px-arcade .px-slider::-moz-range-thumb {
  background: var(--px-accent-2);
}

/* ==========================================================================
   PUXEL — containers & navigation: card, alert, toast, tabs, accordion,
   table, dialog, menu, tooltip, breadcrumb, pagination
   ========================================================================== */

/* ---- Card ------------------------------------------------------------- */
.px-card {
  --px-card-frame: var(--px-border-color);
  --px-card-fill: var(--px-surface);
  display: flex;
  flex-direction: column;
  background: var(--px-card-fill);
  border: var(--px-border-w) solid var(--px-card-frame);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow);
}
.px-card--flat { box-shadow: none; }
.px-card--accent {
  --px-card-frame: var(--px-accent-2);
  --px-card-fill: color-mix(in srgb, var(--px-accent-2) 18%, var(--px-surface));
}
.px-card--danger {
  --px-card-frame: var(--px-danger);
  --px-card-fill: color-mix(in srgb, var(--px-danger) 18%, var(--px-surface));
}
.px-card--info {
  --px-card-frame: var(--px-info);
  --px-card-fill: color-mix(in srgb, var(--px-info) 18%, var(--px-surface));
}
.px-card--success {
  --px-card-frame: var(--px-success);
  --px-card-fill: color-mix(in srgb, var(--px-success) 18%, var(--px-surface));
}
.px-card--warning {
  --px-card-frame: var(--px-warning);
  --px-card-fill: color-mix(in srgb, var(--px-warning) 22%, var(--px-surface));
}
.px-card--hover {
  transition:
    transform var(--px-speed) var(--px-ease),
    box-shadow var(--px-speed) var(--px-ease),
    filter var(--px-speed) var(--px-ease);
}
.px-card--hover:hover {
  transform: translate(-2px, -2px);
  box-shadow: var(--px-shadow-lg);
}

/* Pixel-stepped cards — both the .px-pixelated (clip) and .px-card--round
   (frame) opt-ins. A plain `border` can't follow the notched silhouette: the
   clip shaves the corner nubs off and the fill shows through the steps, so the
   border reads as broken at every corner. Instead we stack two clipped layers so
   EVERY outer pixel — straight edges AND corner steps — is the border colour:
   the card itself is a border-colour silhouette clipped to --px-pixel-clip, and
   a ::before painted in the surface fill, inset by one border width and clipped
   to the same shape, leaves exactly a one-border-width frame showing all around.
   Content sits above ::before and is inset by the card's padding so the frame is
   never covered (even by an opaque accent header/footer). box-shadow can't
   survive the clip, so depth is the --px-pixel-shadow filter. */
.px-card.px-pixelated,
.px-card--round {
  position: relative;
  isolation: isolate;
  border: none;
  border-radius: 0;
  box-shadow: none;
  padding: var(--px-border-w);
  background: var(--px-card-frame);
  clip-path: var(--px-pixel-clip);
  filter: var(--px-pixel-shadow);
}
.px-card.px-pixelated::before,
.px-card--round::before {
  content: "";
  position: absolute;
  inset: var(--px-border-w);
  z-index: 0;
  background: var(--px-card-fill);
  clip-path: var(--px-pixel-clip);
}
.px-card.px-pixelated > *,
.px-card--round > * {
  position: relative;
  z-index: 1;
}
.px-card--flat.px-pixelated,
.px-card--round.px-card--flat { filter: none; }
.px-card--hover.px-pixelated:hover,
.px-card--round.px-card--hover:hover { filter: var(--px-pixel-shadow-lg); }
.px-card--tile {
  align-items: center;
  justify-content: center;
  aspect-ratio: 1;
  min-width: 58px;
  min-height: 58px;
  padding: var(--px-space-3);
}
.px-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  border-bottom: var(--px-border-w) solid var(--px-card-frame);
}
.px-card-header--accent { background: var(--px-accent); color: var(--px-accent-ink); }
.px-card-title {
  margin: 0;
  font-family: var(--px-font-display);
  font-size: 12px;
  text-transform: uppercase;
}
.px-card-body { flex: 1 1 auto; padding: var(--px-space-5); }
.px-card-footer {
  display: flex;
  align-items: center;
  gap: var(--px-space-3);
  margin-top: auto;
  padding: var(--px-space-4) var(--px-space-5);
  border-top: var(--px-border-w) solid var(--px-card-frame);
  background: var(--px-surface-2);
}
.px-card--compact .px-card-header {
  padding: var(--px-space-3) var(--px-space-4);
}
.px-card--compact .px-card-title {
  font-size: 10px;
}
.px-card--compact .px-card-body {
  padding: var(--px-space-4);
}
.px-card--compact .px-card-footer {
  padding: var(--px-space-3) var(--px-space-4);
}

/* ---- Character card (avatar + identity, pixel-rounded frame) ------------- */
/* A seat/roster card: an avatar slot beside a name/role/model/status stack.
   Uses the same ::before pixel-rounded frame as .px-card--round so avatars can
   overflow the frame (perched sprites, portrait crops). A `tone` washes the
   frame + border in a semantic colour; `state` retints the border. */
.px-character-card {
  position: relative;
  isolation: isolate;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px;
  background: transparent;
  border: none;
  box-shadow: none;
  /* the frame (every outer pixel) vs. the interior wash — retinted by tone/state */
  --px-cc-frame: var(--px-border-color);
  --px-cc-fill: var(--px-surface);
}
/* Two stacked clipped layers (see .px-card--round) so every outer pixel — the
   notched corner steps included — is the frame colour. Both sit BEHIND the
   content, and the card is never clipped, so perched avatars and speech bubbles
   overflow freely. */
.px-character-card::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -2;
  background: var(--px-cc-frame);
  clip-path: var(--px-pixel-clip);
  filter: var(--px-pixel-shadow);
  transition: background var(--px-speed) var(--px-ease);
}
.px-character-card::after {
  content: "";
  position: absolute;
  inset: var(--px-border-w);
  z-index: -1;
  background: var(--px-cc-fill);
  clip-path: var(--px-pixel-clip);
}
.px-character-card-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  overflow: visible;
}
/* square-cornered variant: one bordered box with a real offset shadow */
.px-character-card--square::before {
  clip-path: none;
  filter: none;
  box-shadow: var(--px-shadow);
  background: var(--px-cc-fill);
  border: var(--px-border-w) solid var(--px-cc-frame);
}
.px-character-card--square::after { display: none; }
.px-character-card--danger {
  --px-cc-frame: var(--px-danger);
  --px-cc-fill: color-mix(in srgb, var(--px-danger) 22%, var(--px-surface));
}
.px-character-card--info {
  --px-cc-frame: var(--px-info);
  --px-cc-fill: color-mix(in srgb, var(--px-info) 22%, var(--px-surface));
}
.px-character-card--accent {
  --px-cc-frame: var(--px-accent-2);
  --px-cc-fill: color-mix(in srgb, var(--px-accent-2) 22%, var(--px-surface));
}
/* state frames: thinking glows accent, talking keeps the tone frame */
.px-character-card--thinking { --px-cc-frame: var(--px-accent-2); }

.px-character-card--stack {
  flex-direction: column;
  align-items: stretch;
}
.px-character-card--stack .px-character-card-avatar {
  align-self: center;
  margin-bottom: var(--px-space-2);
  min-height: 44px;
}
.px-character-card--stack .px-character-card-info {
  text-align: center;
}
.px-character-card--stack .px-character-card-model {
  justify-content: center;
}
.px-character-card--compact {
  gap: 8px;
  padding: 8px;
}
.px-character-card--compact .px-character-card-name {
  font-size: 9px;
}
.px-character-card--compact .px-character-card-role {
  font-size: 6px;
  margin-top: 4px;
}
.px-character-card--compact .px-character-card-model {
  font-size: 9px;
}
.px-character-card--compact .px-character-card-status {
  font-size: 8px;
  min-height: 10px;
}

.px-character-card-info { min-width: 0; }
.px-character-card-name {
  font-family: var(--px-font-display);
  font-size: 10px;
}
.px-character-card-role {
  font-family: var(--px-font-display);
  font-size: 7px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
  margin-top: 5px;
}
.px-character-card-model {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
  font-family: var(--px-font-mono);
  font-size: 10px;
  color: var(--px-ink-muted);
  word-break: break-all;
}
.px-character-card-status {
  font-size: 10px;
  color: var(--px-accent-2);
  margin-top: 3px;
  min-height: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ---- Popover (portalled hover/focus info-card) --------------------------- */
/* The <Popover> component portals a fixed-positioned wrapper to <body> and
   renders this card inside it, so .px-popover itself is just the framed panel
   (no positioning) — usable standalone too. */
.px-popover {
  width: 240px;
  padding: 12px;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  animation: px-pop-in 0.14s var(--px-ease);
}
@keyframes px-pop-in {
  from { opacity: 0; }
}
.px-popover-title {
  font-family: var(--px-font-display);
  font-size: 12px;
  color: var(--px-ink);
  margin-bottom: 9px;
}
.px-popover-head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.px-popover-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 9px;
  font-family: var(--px-font-mono);
  font-size: 10px;
  color: var(--px-ink-muted);
  word-break: break-all;
}
.px-popover-stats {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 4px 10px;
  margin-top: 10px;
  padding-top: 9px;
  border-top: var(--px-border-w-thin) solid var(--px-border-color);
  font-size: 11px;
  color: var(--px-ink-muted);
}
.px-popover-stats b {
  color: var(--px-ink);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.px-trigger {
  cursor: help;
  outline: none;
}

/* ---- Chat (message feed with actions + turn separators) ------------------ */
.px-chat {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
}
.px-chat-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-family: var(--px-font-display);
  font-size: 9px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--px-ink);
  padding: 9px 14px;
  background: var(--px-surface-2);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
}
.px-chat-close {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  line-height: 1;
  color: var(--px-ink);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
}
.px-chat-scroll {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 11px;
  min-height: 0;
  padding: 12px;
}
.px-chat-footer {
  padding: 10px;
  background: var(--px-surface-2);
  border-top: var(--px-border-w) solid var(--px-border-color);
}
.px-chat-composer {
  display: flex;
  align-items: stretch;
  gap: var(--px-space-2);
}
.px-chat-composer-input {
  min-width: 0;
  flex: 1 1 auto;
  font-size: 12px;
}
.px-chat-composer-send {
  flex: 0 0 auto;
  padding-inline: 12px;
  font-size: 12px;
  box-shadow: none;
}
.px-chat-composer-send:hover {
  box-shadow: 2px 2px 0 0 var(--px-shadow-color);
}
/* message: avatar + name/text body */
.px-chat-msg {
  display: flex;
  gap: 9px;
  font-size: 12.5px;
  line-height: 1.4;
}
.px-chat-avatar {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
}
.px-chat-body { min-width: 0; }
.px-chat-name {
  display: block;
  font-weight: 800;
  font-size: 11px;
}
.px-chat-msg--danger .px-chat-name { color: var(--px-danger); }
.px-chat-msg--info .px-chat-name { color: var(--px-info); }
.px-chat-msg--accent .px-chat-name { color: var(--px-accent-2); }
.px-chat-text { color: var(--px-ink); }
/* host/system line — no avatar, italic accent */
.px-chat-msg--host {
  display: block;
  font-style: italic;
  color: var(--px-accent-2);
}
/* turn separator: a centered label between two rules */
.px-chat-turn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--px-font-display);
  font-size: 7px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
}
.px-chat-turn::before,
.px-chat-turn::after {
  content: "";
  flex: 1;
  height: 2px;
  background: var(--px-border-color);
  opacity: 0.4;
}
.px-chat-turn--danger span { color: var(--px-danger); }
.px-chat-turn--info span { color: var(--px-info); }
/* action chip: a tagged move/event line, tone-railed */
.px-chat-action {
  display: flex;
  align-items: baseline;
  gap: 7px;
  font-size: 12px;
  line-height: 1.4;
  padding: 5px 8px;
  background: var(--px-surface-2);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-chat-action-body {
  color: var(--px-ink);
  min-width: 0;
}
.px-chat-action-tag {
  flex-shrink: 0;
  font-family: var(--px-font-display);
  font-size: 7px;
  letter-spacing: 0.02em;
  padding: 3px 5px;
  background: var(--px-ink-muted);
  color: var(--px-bg);
}
.px-chat-action--danger { box-shadow: inset 4px 0 0 var(--px-danger); }
.px-chat-action--info { box-shadow: inset 4px 0 0 var(--px-info); }
.px-chat-action--danger .px-chat-action-tag { background: var(--px-danger); color: var(--px-danger-ink); }
.px-chat-action--info .px-chat-action-tag { background: var(--px-info); color: var(--px-info-ink); }
.px-chat-action--accent .px-chat-action-tag { background: var(--px-accent-2); color: var(--px-accent-2-ink); }

/* ---- Alert -------------------------------------------------------------- */
.px-alert {
  display: flex;
  gap: var(--px-space-3);
  padding: var(--px-space-4);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-left-width: 10px;
  box-shadow: var(--px-shadow-sm);
}
.px-alert-icon {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  font-weight: 900;
  font-size: 14px;
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-alert-title {
  margin: 0 0 2px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.px-alert-body { font-size: 13px; margin: 0; }
.px-alert--info { border-left-color: var(--px-info); }
.px-alert--info .px-alert-icon { background: var(--px-info); color: var(--px-info-ink); }
.px-alert--success { border-left-color: var(--px-success); }
.px-alert--success .px-alert-icon { background: var(--px-success); color: var(--px-success-ink); }
.px-alert--warning { border-left-color: var(--px-warning); }
.px-alert--warning .px-alert-icon { background: var(--px-warning); color: var(--px-warning-ink); }
.px-alert--danger { border-left-color: var(--px-danger); }
.px-alert--danger .px-alert-icon { background: var(--px-danger); color: var(--px-danger-ink); }

/* ---- Toast --------------------------------------------------------------- */
.px-toast-viewport {
  position: fixed;
  bottom: var(--px-space-5);
  right: var(--px-space-5);
  display: flex;
  flex-direction: column;
  gap: var(--px-space-3);
  z-index: 300;
}
.px-toast {
  display: flex;
  align-items: center;
  gap: var(--px-space-3);
  min-width: 260px;
  max-width: 360px;
  padding: var(--px-space-3) var(--px-space-4);
  background: var(--px-ink);
  color: var(--px-bg);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  font-size: 13px;
  font-weight: 600;
  animation: px-toast-in 180ms var(--px-ease);
}
.px-toast--success { background: var(--px-success); color: var(--px-success-ink); }
.px-toast--danger { background: var(--px-danger); color: var(--px-danger-ink); }
.px-toast--warning { background: var(--px-warning); color: var(--px-warning-ink); }
.px-toast-close {
  margin-left: auto;
  background: none;
  border: none;
  color: inherit;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  padding: 0 2px;
}
@keyframes px-toast-in {
  from { transform: translateX(30px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .px-toast { animation: none; }
}

/* ---- Global animations -------------------------------------------------
   Full-viewport, non-interactive celebration layers. Confetti is adapted from
   the Codenames win overlay; the other variants reuse the same particle model
   with pixel-friendly motion. */
.px-global-animation {
  position: fixed;
  inset: 0;
  z-index: 250;
  overflow: hidden;
  pointer-events: none;
  contain: layout paint;
}
.px-global-animation-piece {
  position: absolute;
  display: block;
  width: var(--px-ga-size);
  height: var(--px-ga-size);
  background: var(--px-ga-color);
  border: 1px solid color-mix(in srgb, var(--px-border-color) 35%, transparent);
  image-rendering: pixelated;
  will-change: transform, opacity;
  z-index: 1;
}

.px-global-animation--confetti .px-global-animation-piece {
  top: -48px;
  left: var(--px-ga-x);
  animation-name: px-global-confetti-fall;
  animation-duration: var(--px-ga-piece-duration);
  animation-delay: var(--px-ga-piece-delay);
  animation-timing-function: linear;
  animation-fill-mode: both;
}
.px-global-animation--confetti .px-global-animation-piece:nth-child(3n) {
  width: calc(var(--px-ga-size) * 0.55);
  height: calc(var(--px-ga-size) * 1.35);
}
.px-global-animation--confetti .px-global-animation-piece:nth-child(4n) {
  width: calc(var(--px-ga-size) * 1.5);
  height: calc(var(--px-ga-size) * 0.55);
}

.px-global-animation--burst .px-global-animation-piece {
  top: var(--px-ga-y);
  left: var(--px-ga-x);
  animation-name: px-global-burst;
  animation-duration: var(--px-ga-piece-duration);
  animation-delay: var(--px-ga-piece-delay);
  animation-timing-function: var(--px-ease);
  animation-fill-mode: both;
}
.px-global-animation--burst::before {
  content: "";
  position: absolute;
  inset: calc(50% - 90px);
  background: repeating-conic-gradient(
    from var(--px-global-burst-ray-angle, 0deg),
    color-mix(in srgb, var(--px-accent-2) 34%, transparent) 0 10deg,
    transparent 10deg 20deg
  );
  opacity: 0;
  --px-global-burst-opacity: 0.26;
  animation: px-global-burst-ring 900ms var(--px-ease) both;
  z-index: 0;
}
.px-global-animation .px-global-animation-sunrays {
  position: absolute;
  inset: calc(50% - 90px);
  z-index: 0;
  opacity: 0;
  --px-global-burst-opacity: 0.9;
  --px-global-burst-ray-angle: 0deg;
  animation: px-global-burst-ring 900ms var(--px-ease) both;
  filter: saturate(1.2) contrast(1.1);
  -webkit-mask-image: repeating-conic-gradient(
    from var(--px-global-burst-ray-angle),
    #000 0 10deg,
    transparent 10deg 20deg
  );
  mask-image: repeating-conic-gradient(
    from var(--px-global-burst-ray-angle),
    #000 0 10deg,
    transparent 10deg 20deg
  );
  -webkit-mask-mode: alpha;
  mask-mode: alpha;
}

.px-global-animation--sparkles .px-global-animation-piece {
  top: var(--px-ga-y);
  left: var(--px-ga-x);
  background: transparent;
  border: 0;
  animation-name: px-global-sparkle;
  animation-duration: var(--px-ga-piece-duration);
  animation-delay: var(--px-ga-piece-delay);
  animation-timing-function: steps(4, end);
  animation-fill-mode: both;
}
.px-global-animation--sparkles .px-global-animation-piece::before,
.px-global-animation--sparkles .px-global-animation-piece::after {
  content: "";
  position: absolute;
  inset: 45% 0;
  background: var(--px-ga-color);
  border: 1px solid color-mix(in srgb, var(--px-border-color) 32%, transparent);
}
.px-global-animation--sparkles .px-global-animation-piece::after {
  transform: rotate(90deg);
}

.px-global-animation--coin-rain .px-global-animation-piece {
  top: -56px;
  left: var(--px-ga-x);
  background: var(--px-accent);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--px-accent-2) 62%, var(--px-accent));
  animation-name: px-global-coin-rain;
  animation-duration: var(--px-ga-piece-duration);
  animation-delay: var(--px-ga-piece-delay);
  animation-timing-function: cubic-bezier(0.14, 0.76, 0.24, 1);
  animation-fill-mode: both;
}
.px-global-animation--coin-rain .px-global-animation-piece::after {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid color-mix(in srgb, var(--px-border-color) 45%, transparent);
}

.px-global-animation--scanline .px-global-animation-piece {
  top: var(--px-ga-y);
  left: var(--px-ga-x);
  width: 36vw;
  height: var(--px-ga-size);
  background:
    linear-gradient(90deg, transparent, var(--px-ga-color), transparent),
    repeating-linear-gradient(90deg, transparent 0 8px, color-mix(in srgb, var(--px-border-color) 24%, transparent) 8px 10px);
  border: 0;
  box-shadow: 0 0 0 var(--px-border-w-thin) color-mix(in srgb, var(--px-ga-color) 28%, transparent);
  opacity: 0;
  animation-name: px-global-scanline;
  animation-duration: var(--px-ga-piece-duration);
  animation-delay: var(--px-ga-piece-delay);
  animation-timing-function: steps(10, end);
  animation-fill-mode: both;
}

@keyframes px-global-confetti-fall {
  0% {
    opacity: 1;
    transform: translate3d(0, -80px, 0) rotate(0deg);
  }
  100% {
    opacity: 0.92;
    transform: translate3d(var(--px-ga-drift), calc(100vh + 120px), 0) rotate(var(--px-ga-spin));
  }
}
@keyframes px-global-burst {
  0% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(0.7) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translate(calc(-50% + var(--px-ga-tx)), calc(-50% + var(--px-ga-ty))) scale(0.15) rotate(var(--px-ga-spin));
  }
}
@keyframes px-global-burst-ring {
  0% {
    opacity: 0;
    transform: scale(0.2) rotate(0deg);
  }
  35% {
    opacity: var(--px-global-burst-opacity, 0.72);
  }
  100% {
    opacity: 0;
    transform: scale(1.65) rotate(90deg);
  }
}
@keyframes px-global-sparkle {
  0% {
    opacity: 0;
    transform: translateY(16px) scale(0.25) rotate(0deg);
  }
  35% {
    opacity: 1;
    transform: translateY(0) scale(1) rotate(90deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-22px) scale(0.1) rotate(180deg);
  }
}
@keyframes px-global-coin-rain {
  0% {
    opacity: 1;
    transform: translate3d(0, -72px, 0) rotateY(0deg) rotate(0deg);
  }
  82% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate3d(var(--px-ga-drift), calc(100vh + 96px), 0) rotateY(540deg) rotate(var(--px-ga-spin));
  }
}
@keyframes px-global-scanline {
  0% {
    opacity: 0;
    transform: translate3d(0, 0, 0);
  }
  12%,
  72% {
    opacity: 0.72;
  }
  100% {
    opacity: 0;
    transform: translate3d(var(--px-ga-tx), var(--px-ga-ty), 0);
  }
}

@media (prefers-reduced-motion: reduce) {
  .px-global-animation-piece,
  .px-global-animation .px-global-animation-sunrays,
  .px-global-animation--burst::before {
    animation: none;
  }
  .px-global-animation .px-global-animation-sunrays,
  .px-global-animation--burst::before {
    opacity: var(--px-global-burst-opacity, 0.72);
    transform: scale(1.1);
  }
  .px-global-animation--confetti .px-global-animation-piece,
  .px-global-animation--coin-rain .px-global-animation-piece {
    opacity: 0.85;
    top: var(--px-ga-y);
  }
  .px-global-animation--burst .px-global-animation-piece,
  .px-global-animation--sparkles .px-global-animation-piece,
  .px-global-animation--scanline .px-global-animation-piece {
    opacity: 0.75;
  }
}

/* ---- Tabs ------------------------------------------------------------------ */
.px-tabs-list {
  display: flex;
  gap: var(--px-space-2);
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
  margin-bottom: calc(var(--px-border-w) * -1);
}
.px-tab {
  padding: 8px 16px;
  font-family: var(--px-font-body);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  border-bottom-color: var(--px-border-color);
  cursor: pointer;
}
.px-tab[aria-selected="true"] {
  color: var(--px-ink);
  background: var(--px-surface);
  border-bottom-color: var(--px-surface);
}
.px-tabs-panel {
  padding: var(--px-space-5);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  position: relative;
}

/* boxed variant: pills instead of folder tabs */
.px-tabs--boxed .px-tabs-list {
  margin-bottom: 0;
}
.px-tabs--boxed .px-tab {
  border-bottom-color: var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-tabs--boxed .px-tab[aria-selected="true"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  border-bottom-color: var(--px-border-color);
  box-shadow: none;
  transform: translate(2px, 2px);
}
.px-tabs--boxed .px-tabs-panel {
  margin-top: var(--px-space-3);
}

/* ---- Accordion --------------------------------------------------------------- */
.px-accordion {
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  background: var(--px-surface);
}
.px-accordion-item + .px-accordion-item {
  border-top: var(--px-border-w) solid var(--px-border-color);
}
.px-accordion-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  width: 100%;
  padding: var(--px-space-4);
  font-family: var(--px-font-body);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  text-align: left;
  color: var(--px-ink);
  background: var(--px-surface);
  border: none;
  cursor: pointer;
}
.px-accordion-trigger:hover { background: var(--px-surface-2); }
.px-accordion-trigger[aria-expanded="true"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
}
.px-accordion-indicator {
  font-family: var(--px-font-display);
  font-size: 10px;
  transition: transform var(--px-speed) var(--px-ease);
}
.px-accordion-trigger[aria-expanded="true"] .px-accordion-indicator {
  transform: rotate(90deg);
}
.px-accordion-content {
  padding: var(--px-space-4);
  font-size: 14px;
  border-top: var(--px-border-w-thin) dashed var(--px-border-color);
}

/* ---- Table ------------------------------------------------------------------- */
.px-table-wrap {
  overflow-x: auto;
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  background: var(--px-surface);
}
.px-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.px-table th {
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  text-align: left;
  color: var(--px-accent-ink);
  background: var(--px-accent);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
}
.px-table td {
  padding: 10px 14px;
  border-bottom: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-table tbody tr:last-child td { border-bottom: none; }
.px-table--striped tbody tr:nth-child(even) { background: var(--px-surface-2); }
.px-table--hover tbody tr:hover { background: var(--px-selection); color: var(--px-selection-ink); }

/* ---- Dialog --------------------------------------------------------------------- */
.px-dialog::backdrop {
  background: rgba(0, 0, 0, 0.55);
}
.px-dialog {
  padding: 0;
  max-width: min(480px, calc(100vw - 32px));
  background: var(--px-surface);
  color: var(--px-ink);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-lg);
}
.px-dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  background: var(--px-accent);
  color: var(--px-accent-ink);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
}
.px-dialog-title {
  margin: 0;
  font-family: var(--px-font-display);
  font-size: 12px;
  text-transform: uppercase;
}
.px-dialog-close {
  background: none;
  border: none;
  font-size: 18px;
  font-weight: 900;
  color: inherit;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
}
.px-dialog-body { padding: var(--px-space-5); font-size: 14px; }
.px-dialog-footer {
  display: flex;
  justify-content: flex-end;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  border-top: var(--px-border-w) solid var(--px-border-color);
  background: var(--px-surface-2);
}

/* ---- Menu (dropdown) ---------------------------------------------------------------- */
.px-menu {
  position: relative;
  display: inline-block;
}
.px-menu-list {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 200px;
  margin: 0;
  padding: var(--px-space-1);
  list-style: none;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  z-index: 100;
}
.px-menu-item {
  display: flex;
  align-items: center;
  gap: var(--px-space-2);
  width: 100%;
  padding: 8px 12px;
  font-family: var(--px-font-body);
  font-size: 13px;
  font-weight: 700;
  text-align: left;
  color: var(--px-ink);
  background: none;
  border: none;
  cursor: pointer;
}
.px-menu-item:hover,
.px-menu-item[data-active="true"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
}
.px-menu-item--danger { color: var(--px-danger); }
.px-menu-item--danger:hover { background: var(--px-danger); color: var(--px-danger-ink); }
.px-menu-separator {
  height: 0;
  margin: var(--px-space-1) 0;
  border-top: var(--px-border-w-thin) dashed var(--px-border-color);
}

/* ---- Tooltip ------------------------------------------------------------------------- */
.px-tooltip-wrap {
  position: relative;
  display: inline-block;
}
.px-tooltip {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  color: var(--px-bg);
  background: var(--px-ink);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--px-speed) var(--px-ease);
  z-index: 200;
}
.px-tooltip-wrap:hover .px-tooltip,
.px-tooltip-wrap:focus-within .px-tooltip {
  opacity: 1;
}

/* ---- Breadcrumb ------------------------------------------------------------------------ */
.px-breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--px-space-2);
  list-style: none;
  margin: 0;
  padding: 0;
  font-size: 13px;
  font-weight: 700;
}
.px-breadcrumb li {
  display: flex;
  align-items: center;
  gap: var(--px-space-2);
}
.px-breadcrumb li + li::before {
  content: "▸";
  color: var(--px-ink-muted);
}
.px-breadcrumb a {
  color: var(--px-ink-muted);
  text-decoration: none;
}
.px-breadcrumb a:hover {
  color: var(--px-ink);
  background: var(--px-accent);
}
.px-breadcrumb [aria-current="page"] {
  color: var(--px-ink);
  background: var(--px-surface-2);
  padding: 1px 8px;
  border: var(--px-border-w-thin) solid var(--px-border-color);
}

/* ---- Pagination ---------------------------------------------------------------------------- */
.px-pagination {
  display: flex;
  gap: var(--px-space-2);
  align-items: center;
}
.px-pagination-btn {
  min-width: 38px;
  padding: 7px 10px;
  font-family: var(--px-font-body);
  font-size: 13px;
  font-weight: 800;
  text-align: center;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  cursor: pointer;
  transition: transform var(--px-speed) var(--px-ease), box-shadow var(--px-speed) var(--px-ease);
}
.px-pagination-btn:hover:not(:disabled):not([aria-current="page"]) {
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 0 var(--px-shadow-color);
}
.px-pagination-btn[aria-current="page"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  transform: translate(2px, 2px);
  box-shadow: none;
  cursor: default;
}
.px-pagination-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.px-pagination-ellipsis {
  padding: 0 4px;
  font-weight: 800;
  color: var(--px-ink-muted);
}

/* ---- Theme switcher -------------------------------------------------------------------------- */
.px-themeswitcher {
  display: inline-flex;
  align-items: center;
  gap: var(--px-space-2);
}
.px-themeswitcher-label {
  font-family: var(--px-font-display);
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0;
  color: var(--px-ink-muted);
}
.px-themeswitcher-options {
  display: inline-flex;
  align-items: center;
  gap: var(--px-space-1);
}
.px-themeswitcher-option {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  padding: 0;
  background: transparent;
  border: var(--px-border-w-thin) solid transparent;
  cursor: var(--px-cursor-point);
}
.px-themeswitcher-option:hover {
  background: var(--px-surface-2);
}
.px-themeswitcher-option[aria-checked="true"] {
  border-color: var(--px-border-color);
  background: var(--px-surface);
}
.px-themeswitcher-swatch {
  display: grid;
  grid-template-columns: repeat(2, 5px);
  grid-template-rows: repeat(2, 5px);
  gap: 1px;
  image-rendering: pixelated;
}
.px-themeswitcher-swatch span {
  width: 5px;
  height: 5px;
  background: var(--px-theme-swatch-1);
}
.px-themeswitcher-swatch span:nth-child(2) {
  background: var(--px-theme-swatch-2);
}
.px-themeswitcher-swatch span:nth-child(3) {
  background: var(--px-theme-swatch-3);
}
.px-themeswitcher-swatch span:nth-child(4) {
  background: var(--px-theme-swatch-4);
}

/* ---- Figure --------------------------------------------------------------------------------- */
.px-figure {
  display: flex;
  flex-direction: column;
  gap: var(--px-space-2);
  margin: 0;
}
.px-figure-media {
  position: relative;
  overflow: hidden;
  line-height: 0;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
}
.px-figure-media img {
  display: block;
  width: 100%;
  height: auto;
}
.px-figure-media.px-pixelated {
  padding: var(--px-border-w);
  background: var(--px-border-color);
  border: none;
  box-shadow: none;
  filter: var(--px-pixel-shadow);
}
.px-figure-media.px-pixelated img,
.px-figure-media.px-pixelated .px-figure-dither {
  clip-path: var(--px-pixel-clip);
}
.px-figure-media.px-pixelated .px-figure-dither {
  inset: var(--px-border-w);
  width: calc(100% - (var(--px-border-w) * 2));
  height: calc(100% - (var(--px-border-w) * 2));
}
.px-figure-dither {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.px-figure-caption {
  display: inline-block;
  align-self: flex-start;
  font-family: var(--px-font-body);
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  padding: 3px 10px 4px;
}
.px-figure-caption--staggered {
  position: relative;
  z-index: 1;
  margin: -14px 0 0 var(--px-space-4);
  background: var(--px-accent);
  color: var(--px-accent-ink);
  transform: rotate(-1.5deg);
}
.px-figure-caption--above.px-figure-caption--staggered {
  margin: 0 0 -14px var(--px-space-4);
}

/* ---- Video player -------------------------------------------------------------------------- */
.px-video-player {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-width: 0;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
}
.px-video-player.px-pixelated {
  padding: var(--px-border-w);
  background: var(--px-border-color);
  border: none;
  box-shadow: none;
  filter: var(--px-pixel-shadow);
}
.px-video-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  min-width: 0;
  padding: var(--px-space-2) var(--px-space-3);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
  background: var(--px-surface-2);
}
.px-video-title {
  min-width: 0;
  overflow: hidden;
  font-family: var(--px-font-display);
  font-size: 10px;
  line-height: 1.5;
  text-overflow: ellipsis;
  text-transform: uppercase;
  white-space: nowrap;
}
.px-video-caption {
  flex: 0 1 auto;
  min-width: 0;
  overflow: hidden;
  font-family: var(--px-font-body);
  font-size: 11px;
  font-weight: 800;
  line-height: 1.35;
  color: var(--px-ink-muted);
  text-align: right;
  text-overflow: ellipsis;
  text-transform: uppercase;
  white-space: nowrap;
}
.px-video-screen {
  position: relative;
  overflow: hidden;
  aspect-ratio: var(--px-video-aspect, 16 / 9);
  background:
    linear-gradient(45deg, transparent 49%, color-mix(in srgb, var(--px-ink) 22%, transparent) 50%, transparent 51%),
    #050505;
}
.px-video-screen video {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #050505;
  cursor: var(--px-cursor-point);
}
.px-video-toolbar {
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) 44px;
  align-items: center;
  gap: var(--px-space-2);
  padding: var(--px-space-2);
  border-top: var(--px-border-w) solid var(--px-border-color);
  background: var(--px-surface);
}
.px-video-button {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  padding: 0;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow-sm);
  cursor: var(--px-cursor-point);
  transition:
    transform var(--px-speed) var(--px-ease),
    box-shadow var(--px-speed) var(--px-ease),
    background var(--px-speed) var(--px-ease);
}
.px-video-button:hover {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 0 var(--px-shadow-color);
}
.px-video-button:active {
  transform: translate(2px, 2px);
  box-shadow: none;
}
.px-video-fullscreen {
  position: absolute;
  right: var(--px-space-2);
  bottom: var(--px-space-2);
  z-index: 1;
  background: color-mix(in srgb, var(--px-surface) 92%, transparent);
}
.px-video-button:focus-visible,
.px-video-range:focus-visible {
  outline: 3px solid var(--px-accent-2);
  outline-offset: 2px;
}
.px-video-seek-group {
  display: flex;
  flex-direction: column;
  min-width: 0;
  gap: var(--px-space-1);
}
.px-video-time {
  display: flex;
  justify-content: space-between;
  gap: var(--px-space-2);
  font-family: var(--px-font-mono);
  font-size: 11px;
  font-weight: 800;
  line-height: 1;
  color: var(--px-ink-muted);
}
.px-video-range {
  width: 100%;
  height: 18px;
  margin: 0;
  padding: 0;
  appearance: none;
  background:
    linear-gradient(
      to right,
      var(--px-accent) 0,
      var(--px-accent) var(--px-range-value, 0%),
      var(--px-surface-2) var(--px-range-value, 0%),
      var(--px-surface-2) 100%
    );
  border: var(--px-border-w-thin) solid var(--px-border-color);
  cursor: var(--px-cursor-point);
}
.px-video-range:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}
.px-video-range::-webkit-slider-thumb {
  width: 12px;
  height: 22px;
  appearance: none;
  background: var(--px-ink);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  box-shadow: 2px 2px 0 0 var(--px-shadow-color);
}
.px-video-range::-moz-range-thumb {
  width: 12px;
  height: 22px;
  background: var(--px-ink);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  border-radius: 0;
  box-shadow: 2px 2px 0 0 var(--px-shadow-color);
}
.px-video-range::-moz-range-track {
  height: 100%;
  background: transparent;
  border: 0;
}
.px-video-player:fullscreen {
  width: 100vw;
  height: 100vh;
  background: var(--px-surface);
}
.px-video-player:fullscreen .px-video-screen {
  flex: 1;
  aspect-ratio: auto;
}

@media (max-width: 560px) {
  .px-video-head {
    align-items: flex-start;
    flex-direction: column;
    gap: var(--px-space-1);
  }
  .px-video-caption {
    max-width: 100%;
    text-align: left;
  }
}

/* ==========================================================================
   PUXEL — game components: progress, health bar, XP bar, score, stat,
   splash/intro screen
   ========================================================================== */

/* ---- Progress (continuous) ------------------------------------------------ */
.px-progress {
  position: relative;
  height: 24px;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  overflow: hidden;
}
.px-progress-fill {
  height: 100%;
  background: var(--px-accent);
  border-right: var(--px-border-w-thin) solid var(--px-border-color);
  transition: width 300ms var(--px-ease);
}
.px-progress-fill--striped {
  background-image: repeating-linear-gradient(
    -45deg,
    transparent 0 8px,
    color-mix(in srgb, var(--px-shadow-color) 22%, transparent) 8px 16px
  );
  background-color: var(--px-accent);
}
.px-progress-fill--animated {
  animation: px-stripes 0.8s linear infinite;
}
@keyframes px-stripes {
  to { background-position: 22px 0; }
}
@media (prefers-reduced-motion: reduce) {
  .px-progress-fill--animated { animation: none; }
}
.px-progress-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--px-font-display);
  font-size: 8px;
  color: var(--px-ink);
  mix-blend-mode: normal;
}
.px-progress--success .px-progress-fill { background-color: var(--px-success); }
.px-progress--danger .px-progress-fill { background-color: var(--px-danger); }
.px-progress--info .px-progress-fill { background-color: var(--px-info); }

/* ---- Dial (radial countdown / gauge) --------------------------------------- */
.px-dial {
  position: relative;
  width: 116px;
  height: 116px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.px-dial--sm { width: 84px; height: 84px; }
