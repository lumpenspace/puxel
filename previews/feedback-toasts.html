:root {
  /* ---- primitives (theme-independent) ---- */
  --px-font-display: "Press Start 2P", "Courier New", monospace;
  --px-font-body: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
  --px-font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --px-space-1: 4px;
  --px-space-2: 8px;
  --px-space-3: 12px;
  --px-space-4: 16px;
  --px-space-5: 24px;
  --px-space-6: 32px;
  --px-space-7: 48px;

  --px-border-w: 3px;
  --px-border-w-thin: 2px;
  --px-radius: 0px;

  --px-shadow-x: 4px;
  --px-shadow-y: 4px;
  --px-shadow: var(--px-shadow-x) var(--px-shadow-y) 0 0 var(--px-shadow-color);
  --px-shadow-sm: 2px 2px 0 0 var(--px-shadow-color);
  --px-shadow-lg: 8px 8px 0 0 var(--px-shadow-color);

  --px-speed: 120ms;
  --px-ease: cubic-bezier(0.2, 0.8, 0.4, 1);
}

@media (prefers-reduced-motion: reduce) {
  :root {
    --px-speed: 0ms;
  }
}

/* ==========================================================================
   THEME: paper (default light) — cream + ink, punchy accents
   ========================================================================== */
:root,
[data-theme="paper"] {
  color-scheme: light;

  --px-bg: #faf3e3;
  --px-surface: #fffdf5;
  --px-surface-2: #f3e9d2;
  --px-ink: #16130d;
  --px-ink-muted: #6b6455;
  --px-border-color: #16130d;
  --px-shadow-color: #16130d;

  --px-accent: #ffd23f;
  --px-accent-ink: #16130d;
  --px-accent-2: #ff6b35;
  --px-accent-2-ink: #16130d;

  --px-success: #00a868;
  --px-success-ink: #ffffff;
  --px-warning: #ffb02e;
  --px-warning-ink: #16130d;
  --px-danger: #ef3e36;
  --px-danger-ink: #ffffff;
  --px-info: #2d7ff9;
  --px-info-ink: #ffffff;

  --px-selection: #ffd23f;
}

/* ==========================================================================
   THEME: midnight (dark) — near-black + off-white ink, yellow/violet neon
   ========================================================================== */
[data-theme="midnight"] {
  color-scheme: dark;

  --px-bg: #0f1115;
  --px-surface: #1a1d24;
  --px-surface-2: #242833;
  --px-ink: #f2f0e9;
  --px-ink-muted: #9a97a3;
  --px-border-color: #f2f0e9;
  --px-shadow-color: #000000;

  --px-accent: #ffd23f;
  --px-accent-ink: #16130d;
  --px-accent-2: #8b7bff;
  --px-accent-2-ink: #0f1115;

  --px-success: #3ddc84;
  --px-success-ink: #0f1115;
  --px-warning: #ffb02e;
  --px-warning-ink: #16130d;
  --px-danger: #ff5c57;
  --px-danger-ink: #0f1115;
  --px-info: #58a6ff;
  --px-info-ink: #0f1115;

  --px-selection: #8b7bff;
}

/* ==========================================================================
   THEME: arcade — NES deep blue, cabinet red + coin gold
   ========================================================================== */
[data-theme="arcade"] {
  color-scheme: dark;

  --px-bg: #171c48;
  --px-surface: #212a6b;
  --px-surface-2: #2b3585;
  --px-ink: #ffffff;
  --px-ink-muted: #9aa3e0;
  --px-border-color: #ffffff;
  --px-shadow-color: #0a0d29;

  --px-accent: #ff4245;
  --px-accent-ink: #ffffff;
  --px-accent-2: #ffc93c;
  --px-accent-2-ink: #171c48;

  --px-success: #6ecb63;
  --px-success-ink: #171c48;
  --px-warning: #ffc93c;
  --px-warning-ink: #171c48;
  --px-danger: #ff4245;
  --px-danger-ink: #ffffff;
  --px-info: #4da6ff;
  --px-info-ink: #171c48;

  --px-selection: #ffc93c;
}

/* ==========================================================================
   THEME: terminal — CRT phosphor green on black, amber secondary
   ========================================================================== */
[data-theme="terminal"] {
  color-scheme: dark;

  --px-bg: #060c06;
  --px-surface: #0a140a;
  --px-surface-2: #102010;
  --px-ink: #33ff66;
  --px-ink-muted: #1e9e44;
  --px-border-color: #33ff66;
  --px-shadow-color: #124d24;

  --px-accent: #33ff66;
  --px-accent-ink: #060c06;
  --px-accent-2: #ffbf00;
  --px-accent-2-ink: #060c06;

  --px-success: #33ff66;
  --px-success-ink: #060c06;
  --px-warning: #ffbf00;
  --px-warning-ink: #060c06;
  --px-danger: #ff5c57;
  --px-danger-ink: #060c06;
  --px-info: #38d1ff;
  --px-info-ink: #060c06;

  --px-selection: #33ff66;

  /* the terminal speaks mono */
  --px-font-body: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

/* ==========================================================================
   PUXEL — base + utilities
   ========================================================================== */

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--px-bg);
  color: var(--px-ink);
  font-family: var(--px-font-body);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: var(--px-selection);
  color: var(--px-ink);
}

/* Every interactive element gets the same loud focus ring */
.px-focusable:focus-visible,
.px-btn:focus-visible,
.px-input:focus-visible,
.px-textarea:focus-visible,
.px-select select:focus-visible,
.px-check input:focus-visible ~ .px-check-box,
.px-radio input:focus-visible ~ .px-radio-dot,
.px-switch input:focus-visible ~ .px-switch-track,
.px-slider:focus-visible,
.px-tab:focus-visible,
.px-accordion-trigger:focus-visible,
.px-pagination-btn:focus-visible,
.px-menu-trigger:focus-visible,
.px-menu-item:focus-visible {
  outline: var(--px-border-w) solid var(--px-accent-2);
  outline-offset: 2px;
}

/* ---- typography ------------------------------------------------------- */
.px-display {
  font-family: var(--px-font-display);
  line-height: 1.5;
  letter-spacing: 0;
  text-transform: uppercase;
  margin: 0;
}
.px-display--xl { font-size: 32px; }
.px-display--lg { font-size: 24px; }
.px-display--md { font-size: 16px; }
.px-display--sm { font-size: 12px; }
.px-display--xs { font-size: 9px; }

.px-label {
  font-family: var(--px-font-body);
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.px-muted { color: var(--px-ink-muted); }

.px-link {
  color: var(--px-ink);
  font-weight: 700;
  text-decoration: underline;
  text-decoration-thickness: 3px;
  text-decoration-color: var(--px-accent);
  text-underline-offset: 3px;
  transition: background var(--px-speed) var(--px-ease);
}
.px-link:hover {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  text-decoration-color: var(--px-ink);
}

/* ---- pixel corners (opt-in) -------------------------------------------
   Stepped clip-path corners: the "8-bit" silhouette without going full NES.
   Works on solid-bg elements; borders are clipped so it pairs best with
   .px-btn--primary / badges / solid chips. */
.px-pixelated {
  clip-path: polygon(
    0 6px, 3px 6px, 3px 3px, 6px 3px, 6px 0,
    calc(100% - 6px) 0, calc(100% - 6px) 3px, calc(100% - 3px) 3px, calc(100% - 3px) 6px, 100% 6px,
    100% calc(100% - 6px), calc(100% - 3px) calc(100% - 6px), calc(100% - 3px) calc(100% - 3px), calc(100% - 6px) calc(100% - 3px), calc(100% - 6px) 100%,
    6px 100%, 6px calc(100% - 3px), 3px calc(100% - 3px), 3px calc(100% - 6px), 0 calc(100% - 6px)
  );
}

/* ---- CRT overlay (opt-in, pairs with the terminal theme) --------------- */
.px-crt {
  position: relative;
}
.px-crt::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0) 0,
    rgba(0, 0, 0, 0) 2px,
    rgba(0, 0, 0, 0.18) 2px,
    rgba(0, 0, 0, 0.18) 3px
  );
  mix-blend-mode: multiply;
}

/* ---- misc utilities ---------------------------------------------------- */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
  border: 0;
}

.px-border { border: var(--px-border-w) solid var(--px-border-color); }
.px-shadow { box-shadow: var(--px-shadow); }
.px-shadow-sm { box-shadow: var(--px-shadow-sm); }
.px-shadow-lg { box-shadow: var(--px-shadow-lg); }

.px-separator {
  border: none;
  border-top: var(--px-border-w) solid var(--px-border-color);
  margin: var(--px-space-5) 0;
}
.px-separator--dashed { border-top-style: dashed; }
.px-separator--vertical {
  display: inline-block;
  align-self: stretch;
  width: 0;
  border-top: none;
  border-left: var(--px-border-w) solid var(--px-border-color);
  margin: 0 var(--px-space-4);
}

.px-kbd {
  display: inline-block;
  padding: 2px 7px 4px;
  font-family: var(--px-font-mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  border-bottom-width: 4px;
  border-radius: var(--px-radius);
}

/* ==========================================================================
   PUXEL — controls: button, badge, avatar, spinner
   ========================================================================== */

/* ---- Button ------------------------------------------------------------ */
.px-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--px-space-2);
  padding: 10px 18px;
  font-family: var(--px-font-body);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow);
  cursor: pointer;
  user-select: none;
  transition:
    transform var(--px-speed) var(--px-ease),
    box-shadow var(--px-speed) var(--px-ease),
    background var(--px-speed) var(--px-ease);
}
.px-btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: calc(var(--px-shadow-x) + 2px) calc(var(--px-shadow-y) + 2px) 0 0 var(--px-shadow-color);
}
.px-btn:active {
  transform: translate(var(--px-shadow-x), var(--px-shadow-y));
  box-shadow: 0 0 0 0 var(--px-shadow-color);
}
.px-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: var(--px-shadow);
}

.px-btn--primary { background: var(--px-accent); color: var(--px-accent-ink); }
.px-btn--secondary { background: var(--px-ink); color: var(--px-bg); }
.px-btn--danger { background: var(--px-danger); color: var(--px-danger-ink); }
.px-btn--success { background: var(--px-success); color: var(--px-success-ink); }
.px-btn--ghost {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
}
.px-btn--ghost:hover {
  transform: none;
  box-shadow: none;
  background: var(--px-surface-2);
  border-color: var(--px-border-color);
}
.px-btn--ghost:active { transform: translate(2px, 2px); }

.px-btn--sm { padding: 6px 12px; font-size: 12px; }
.px-btn--lg { padding: 14px 26px; font-size: 16px; }
.px-btn--icon { padding: 10px; }
.px-btn--icon.px-btn--sm { padding: 6px; }
.px-btn--icon.px-btn--lg { padding: 14px; }

/* pixel-display variant: the loud one */
.px-btn--pixel {
  font-family: var(--px-font-display);
  font-size: 11px;
  padding: 12px 18px;
}

/* ---- Badge -------------------------------------------------------------- */
.px-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px 4px;
  font-family: var(--px-font-body);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  border-radius: var(--px-radius);
}
.px-badge--primary { background: var(--px-accent); color: var(--px-accent-ink); }
.px-badge--secondary { background: var(--px-ink); color: var(--px-bg); border-color: var(--px-border-color); }
.px-badge--success { background: var(--px-success); color: var(--px-success-ink); }
.px-badge--warning { background: var(--px-warning); color: var(--px-warning-ink); }
.px-badge--danger { background: var(--px-danger); color: var(--px-danger-ink); }
.px-badge--info { background: var(--px-info); color: var(--px-info-ink); }
.px-badge--outline { background: transparent; }
.px-badge--pixel { font-family: var(--px-font-display); font-size: 8px; padding: 5px 10px; }

/* ---- Avatar -------------------------------------------------------------- */
.px-avatar {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  font-family: var(--px-font-display);
  font-size: 12px;
  text-transform: uppercase;
  color: var(--px-accent-ink);
  background: var(--px-accent);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow-sm);
  overflow: visible;
}
.px-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  image-rendering: pixelated;
}
.px-avatar--sm { width: 32px; height: 32px; font-size: 9px; }
.px-avatar--lg { width: 64px; height: 64px; font-size: 16px; }
.px-avatar-status {
  position: absolute;
  right: -6px;
  bottom: -6px;
  width: 12px;
  height: 12px;
  background: var(--px-success);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-avatar-status--away { background: var(--px-warning); }
.px-avatar-status--busy { background: var(--px-danger); }
.px-avatar-status--offline { background: var(--px-ink-muted); }

.px-avatar-group {
  display: inline-flex;
}
.px-avatar-group .px-avatar { box-shadow: none; }
.px-avatar-group .px-avatar + .px-avatar { margin-left: -10px; }

/* ---- Spinner (blocky, steps through quadrants) --------------------------- */
.px-spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  background: conic-gradient(
    var(--px-accent) 0 25%,
    var(--px-ink) 25% 50%,
    var(--px-accent-2) 50% 75%,
    var(--px-ink) 75% 100%
  );
  border: var(--px-border-w-thin) solid var(--px-border-color);
  animation: px-spin 0.9s steps(4) infinite;
}
.px-spinner--sm { width: 14px; height: 14px; }
.px-spinner--lg { width: 34px; height: 34px; }
@keyframes px-spin {
  to { transform: rotate(360deg); }
}
@media (prefers-reduced-motion: reduce) {
  .px-spinner { animation-duration: 2.5s; }
}

/* ==========================================================================
   PUXEL — forms: input, textarea, select, checkbox, radio, switch, slider,
   fieldset (title-on-border section)
   ========================================================================== */

.px-field {
  display: flex;
  flex-direction: column;
  gap: var(--px-space-2);
}
.px-field-hint {
  font-size: 12px;
  color: var(--px-ink-muted);
}
.px-field-error {
  font-size: 12px;
  font-weight: 700;
  color: var(--px-danger);
}

/* ---- Input / Textarea ----------------------------------------------------- */
.px-input,
.px-textarea {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--px-font-body);
  font-size: 14px;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: inset 3px 3px 0 0 color-mix(in srgb, var(--px-shadow-color) 12%, transparent);
  transition: box-shadow var(--px-speed) var(--px-ease);
}
.px-input::placeholder,
.px-textarea::placeholder {
  color: var(--px-ink-muted);
}
.px-input:focus,
.px-textarea:focus {
  outline: none;
  box-shadow: var(--px-shadow);
}
.px-input:disabled,
.px-textarea:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--px-surface-2);
}
.px-input--error,
.px-textarea--error {
  border-color: var(--px-danger);
  box-shadow: inset 3px 3px 0 0 color-mix(in srgb, var(--px-danger) 20%, transparent);
}
.px-textarea {
  min-height: 90px;
  resize: vertical;
}

/* input with attached addon (search icon, prefix, button) */
.px-input-group {
  display: flex;
  align-items: stretch;
}
.px-input-group .px-input { flex: 1; }
.px-input-group > * + * { margin-left: calc(var(--px-border-w) * -1); }
.px-input-addon {
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  font-weight: 800;
  font-size: 13px;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
}

/* ---- Select ---------------------------------------------------------------- */
.px-select {
  position: relative;
  display: inline-block;
  width: 100%;
}
.px-select select {
  width: 100%;
  padding: 10px 40px 10px 12px;
  font-family: var(--px-font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow-sm);
  appearance: none;
  cursor: pointer;
}
.px-select::after {
  content: "▼";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  pointer-events: none;
  color: var(--px-ink);
}
.px-select select:focus { outline: none; }
.px-select select:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Checkbox ---------------------------------------------------------------- */
.px-check,
.px-radio,
.px-switch {
  display: inline-flex;
  align-items: center;
  gap: var(--px-space-3);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  user-select: none;
}
.px-check input,
.px-radio input,
.px-switch input {
  position: absolute;
  opacity: 0;
  width: 1px;
  height: 1px;
}
.px-check-box {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  transition: background var(--px-speed) var(--px-ease);
}
.px-check-box::after {
  content: "";
  width: 12px;
  height: 12px;
  background: var(--px-accent-ink);
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  transform: scale(0);
  transition: transform var(--px-speed) var(--px-ease);
}
.px-check input:checked ~ .px-check-box {
  background: var(--px-accent);
}
.px-check input:checked ~ .px-check-box::after {
  transform: scale(1);
}
.px-check input:disabled ~ * { opacity: 0.5; cursor: not-allowed; }

/* ---- Radio ---------------------------------------------------------------- */
.px-radio-dot {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-radio-dot::after {
  content: "";
  width: 10px;
  height: 10px;
  background: var(--px-ink);
  transform: scale(0);
  transition: transform var(--px-speed) var(--px-ease);
}
.px-radio input:checked ~ .px-radio-dot::after { transform: scale(1); }
.px-radio input:disabled ~ * { opacity: 0.5; cursor: not-allowed; }

/* ---- Switch ---------------------------------------------------------------- */
.px-switch-track {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 26px;
  flex-shrink: 0;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  transition: background var(--px-speed) var(--px-ease);
}
.px-switch-track::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: var(--px-ink);
  transition: transform var(--px-speed) var(--px-ease);
}
.px-switch input:checked ~ .px-switch-track {
  background: var(--px-success);
}
.px-switch input:checked ~ .px-switch-track::after {
  transform: translateX(22px);
  background: var(--px-surface);
}
.px-switch input:disabled ~ * { opacity: 0.5; cursor: not-allowed; }

/* ---- Slider ---------------------------------------------------------------- */
.px-slider {
  appearance: none;
  width: 100%;
  height: 26px;
  background: transparent;
  cursor: pointer;
}
.px-slider::-webkit-slider-runnable-track {
  height: 12px;
  background: var(--px-surface-2);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-slider::-webkit-slider-thumb {
  appearance: none;
  width: 22px;
  height: 22px;
  margin-top: -8px;
  background: var(--px-accent);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-slider::-moz-range-track {
  height: 12px;
  background: var(--px-surface-2);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 0;
  background: var(--px-accent);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-slider:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Fieldset: the title-on-border section (nes-ui style, modernized) ------ */
.px-fieldset {
  position: relative;
  padding: var(--px-space-5);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
}
.px-fieldset--shadow { box-shadow: var(--px-shadow); }
.px-fieldset-title {
  position: absolute;
  top: 0;
  left: var(--px-space-4);
  transform: translateY(-50%);
  padding: 2px 10px;
  font-family: var(--px-font-display);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-fieldset-title--accent {
  background: var(--px-accent);
  color: var(--px-accent-ink);
}
.px-fieldset-title--center {
  left: 50%;
  transform: translate(-50%, -50%);
}
.px-fieldset-title--right {
  left: auto;
  right: var(--px-space-4);
}

/* ==========================================================================
   PUXEL — containers & navigation: card, alert, toast, tabs, accordion,
   table, dialog, menu, tooltip, breadcrumb, pagination
   ========================================================================== */

/* ---- Card ------------------------------------------------------------- */
.px-card {
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-radius: var(--px-radius);
  box-shadow: var(--px-shadow);
}
.px-card--flat { box-shadow: none; }
.px-card--hover {
  transition:
    transform var(--px-speed) var(--px-ease),
    box-shadow var(--px-speed) var(--px-ease);
}
.px-card--hover:hover {
  transform: translate(-2px, -2px);
  box-shadow: var(--px-shadow-lg);
}
.px-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
}
.px-card-header--accent { background: var(--px-accent); color: var(--px-accent-ink); }
.px-card-title {
  margin: 0;
  font-family: var(--px-font-display);
  font-size: 12px;
  text-transform: uppercase;
}
.px-card-body { padding: var(--px-space-5); }
.px-card-footer {
  display: flex;
  align-items: center;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  border-top: var(--px-border-w) solid var(--px-border-color);
  background: var(--px-surface-2);
}

/* ---- Alert -------------------------------------------------------------- */
.px-alert {
  display: flex;
  gap: var(--px-space-3);
  padding: var(--px-space-4);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  border-left-width: 10px;
  box-shadow: var(--px-shadow-sm);
}
.px-alert-icon {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  font-weight: 900;
  font-size: 14px;
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-alert-title {
  margin: 0 0 2px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.px-alert-body { font-size: 13px; margin: 0; }
.px-alert--info { border-left-color: var(--px-info); }
.px-alert--info .px-alert-icon { background: var(--px-info); color: var(--px-info-ink); }
.px-alert--success { border-left-color: var(--px-success); }
.px-alert--success .px-alert-icon { background: var(--px-success); color: var(--px-success-ink); }
.px-alert--warning { border-left-color: var(--px-warning); }
.px-alert--warning .px-alert-icon { background: var(--px-warning); color: var(--px-warning-ink); }
.px-alert--danger { border-left-color: var(--px-danger); }
.px-alert--danger .px-alert-icon { background: var(--px-danger); color: var(--px-danger-ink); }

/* ---- Toast --------------------------------------------------------------- */
.px-toast-viewport {
  position: fixed;
  bottom: var(--px-space-5);
  right: var(--px-space-5);
  display: flex;
  flex-direction: column;
  gap: var(--px-space-3);
  z-index: 300;
}
.px-toast {
  display: flex;
  align-items: center;
  gap: var(--px-space-3);
  min-width: 260px;
  max-width: 360px;
  padding: var(--px-space-3) var(--px-space-4);
  background: var(--px-ink);
  color: var(--px-bg);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  font-size: 13px;
  font-weight: 600;
  animation: px-toast-in 180ms var(--px-ease);
}
.px-toast--success { background: var(--px-success); color: var(--px-success-ink); }
.px-toast--danger { background: var(--px-danger); color: var(--px-danger-ink); }
.px-toast--warning { background: var(--px-warning); color: var(--px-warning-ink); }
.px-toast-close {
  margin-left: auto;
  background: none;
  border: none;
  color: inherit;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  padding: 0 2px;
}
@keyframes px-toast-in {
  from { transform: translateX(30px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .px-toast { animation: none; }
}

/* ---- Tabs ------------------------------------------------------------------ */
.px-tabs-list {
  display: flex;
  gap: var(--px-space-2);
  flex-wrap: wrap;
}
.px-tab {
  padding: 8px 16px;
  font-family: var(--px-font-body);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  border-bottom: none;
  cursor: pointer;
  transform: translateY(var(--px-border-w));
}
.px-tab[aria-selected="true"] {
  color: var(--px-ink);
  background: var(--px-surface);
  position: relative;
  z-index: 1;
}
.px-tab[aria-selected="true"]::after {
  content: "";
  display: block;
  position: absolute;
  left: 0;
  right: 0;
  bottom: calc(var(--px-border-w) * -1);
  height: var(--px-border-w);
  background: var(--px-surface);
}
.px-tabs-panel {
  padding: var(--px-space-5);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
}

/* boxed variant: pills instead of folder tabs */
.px-tabs--boxed .px-tab {
  border-bottom: var(--px-border-w) solid var(--px-border-color);
  transform: none;
  box-shadow: var(--px-shadow-sm);
}
.px-tabs--boxed .px-tab[aria-selected="true"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  box-shadow: none;
  transform: translate(2px, 2px);
}
.px-tabs--boxed .px-tab[aria-selected="true"]::after { display: none; }
.px-tabs--boxed .px-tabs-panel {
  margin-top: var(--px-space-3);
}

/* ---- Accordion --------------------------------------------------------------- */
.px-accordion {
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  background: var(--px-surface);
}
.px-accordion-item + .px-accordion-item {
  border-top: var(--px-border-w) solid var(--px-border-color);
}
.px-accordion-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  width: 100%;
  padding: var(--px-space-4);
  font-family: var(--px-font-body);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  text-align: left;
  color: var(--px-ink);
  background: var(--px-surface);
  border: none;
  cursor: pointer;
}
.px-accordion-trigger:hover { background: var(--px-surface-2); }
.px-accordion-trigger[aria-expanded="true"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
}
.px-accordion-indicator {
  font-family: var(--px-font-display);
  font-size: 10px;
  transition: transform var(--px-speed) var(--px-ease);
}
.px-accordion-trigger[aria-expanded="true"] .px-accordion-indicator {
  transform: rotate(90deg);
}
.px-accordion-content {
  padding: var(--px-space-4);
  font-size: 14px;
  border-top: var(--px-border-w-thin) dashed var(--px-border-color);
}

/* ---- Table ------------------------------------------------------------------- */
.px-table-wrap {
  overflow-x: auto;
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  background: var(--px-surface);
}
.px-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.px-table th {
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  text-align: left;
  color: var(--px-accent-ink);
  background: var(--px-accent);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
}
.px-table td {
  padding: 10px 14px;
  border-bottom: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-table tbody tr:last-child td { border-bottom: none; }
.px-table--striped tbody tr:nth-child(even) { background: var(--px-surface-2); }
.px-table--hover tbody tr:hover { background: var(--px-selection); color: var(--px-ink); }

/* ---- Dialog --------------------------------------------------------------------- */
.px-dialog::backdrop {
  background: rgba(0, 0, 0, 0.55);
}
.px-dialog {
  padding: 0;
  max-width: min(480px, calc(100vw - 32px));
  background: var(--px-surface);
  color: var(--px-ink);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-lg);
}
.px-dialog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  background: var(--px-accent);
  color: var(--px-accent-ink);
  border-bottom: var(--px-border-w) solid var(--px-border-color);
}
.px-dialog-title {
  margin: 0;
  font-family: var(--px-font-display);
  font-size: 12px;
  text-transform: uppercase;
}
.px-dialog-close {
  background: none;
  border: none;
  font-size: 18px;
  font-weight: 900;
  color: inherit;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
}
.px-dialog-body { padding: var(--px-space-5); font-size: 14px; }
.px-dialog-footer {
  display: flex;
  justify-content: flex-end;
  gap: var(--px-space-3);
  padding: var(--px-space-4) var(--px-space-5);
  border-top: var(--px-border-w) solid var(--px-border-color);
  background: var(--px-surface-2);
}

/* ---- Menu (dropdown) ---------------------------------------------------------------- */
.px-menu {
  position: relative;
  display: inline-block;
}
.px-menu-list {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 200px;
  margin: 0;
  padding: var(--px-space-1);
  list-style: none;
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
  z-index: 100;
}
.px-menu-item {
  display: flex;
  align-items: center;
  gap: var(--px-space-2);
  width: 100%;
  padding: 8px 12px;
  font-family: var(--px-font-body);
  font-size: 13px;
  font-weight: 700;
  text-align: left;
  color: var(--px-ink);
  background: none;
  border: none;
  cursor: pointer;
}
.px-menu-item:hover,
.px-menu-item[data-active="true"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
}
.px-menu-item--danger { color: var(--px-danger); }
.px-menu-item--danger:hover { background: var(--px-danger); color: var(--px-danger-ink); }
.px-menu-separator {
  height: 0;
  margin: var(--px-space-1) 0;
  border-top: var(--px-border-w-thin) dashed var(--px-border-color);
}

/* ---- Tooltip ------------------------------------------------------------------------- */
.px-tooltip-wrap {
  position: relative;
  display: inline-block;
}
.px-tooltip {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  color: var(--px-bg);
  background: var(--px-ink);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--px-speed) var(--px-ease);
  z-index: 200;
}
.px-tooltip-wrap:hover .px-tooltip,
.px-tooltip-wrap:focus-within .px-tooltip {
  opacity: 1;
}

/* ---- Breadcrumb ------------------------------------------------------------------------ */
.px-breadcrumb {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--px-space-2);
  list-style: none;
  margin: 0;
  padding: 0;
  font-size: 13px;
  font-weight: 700;
}
.px-breadcrumb li {
  display: flex;
  align-items: center;
  gap: var(--px-space-2);
}
.px-breadcrumb li + li::before {
  content: "▸";
  color: var(--px-ink-muted);
}
.px-breadcrumb a {
  color: var(--px-ink-muted);
  text-decoration: none;
}
.px-breadcrumb a:hover {
  color: var(--px-ink);
  background: var(--px-accent);
}
.px-breadcrumb [aria-current="page"] {
  color: var(--px-ink);
  background: var(--px-surface-2);
  padding: 1px 8px;
  border: var(--px-border-w-thin) solid var(--px-border-color);
}

/* ---- Pagination ---------------------------------------------------------------------------- */
.px-pagination {
  display: flex;
  gap: var(--px-space-2);
  align-items: center;
}
.px-pagination-btn {
  min-width: 38px;
  padding: 7px 10px;
  font-family: var(--px-font-body);
  font-size: 13px;
  font-weight: 800;
  text-align: center;
  color: var(--px-ink);
  background: var(--px-surface);
  border: var(--px-border-w-thin) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  cursor: pointer;
  transition: transform var(--px-speed) var(--px-ease), box-shadow var(--px-speed) var(--px-ease);
}
.px-pagination-btn:hover:not(:disabled):not([aria-current="page"]) {
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 0 var(--px-shadow-color);
}
.px-pagination-btn[aria-current="page"] {
  background: var(--px-accent);
  color: var(--px-accent-ink);
  transform: translate(2px, 2px);
  box-shadow: none;
  cursor: default;
}
.px-pagination-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.px-pagination-ellipsis {
  padding: 0 4px;
  font-weight: 800;
  color: var(--px-ink-muted);
}

/* ==========================================================================
   PUXEL — game components: progress, health bar, XP bar, score, stat,
   splash/intro screen
   ========================================================================== */

/* ---- Progress (continuous) ------------------------------------------------ */
.px-progress {
  position: relative;
  height: 24px;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
  overflow: hidden;
}
.px-progress-fill {
  height: 100%;
  background: var(--px-accent);
  border-right: var(--px-border-w-thin) solid var(--px-border-color);
  transition: width 300ms var(--px-ease);
}
.px-progress-fill--striped {
  background-image: repeating-linear-gradient(
    -45deg,
    transparent 0 8px,
    color-mix(in srgb, var(--px-shadow-color) 22%, transparent) 8px 16px
  );
  background-color: var(--px-accent);
}
.px-progress-fill--animated {
  animation: px-stripes 0.8s linear infinite;
}
@keyframes px-stripes {
  to { background-position: 22px 0; }
}
@media (prefers-reduced-motion: reduce) {
  .px-progress-fill--animated { animation: none; }
}
.px-progress-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--px-font-display);
  font-size: 8px;
  color: var(--px-ink);
  mix-blend-mode: normal;
}
.px-progress--success .px-progress-fill { background-color: var(--px-success); }
.px-progress--danger .px-progress-fill { background-color: var(--px-danger); }
.px-progress--info .px-progress-fill { background-color: var(--px-info); }

/* ---- Health bar (segmented cells) ------------------------------------------ */
.px-healthbar {
  display: flex;
  align-items: center;
  gap: var(--px-space-3);
}
.px-healthbar-label {
  font-family: var(--px-font-display);
  font-size: 9px;
  text-transform: uppercase;
  min-width: 30px;
}
.px-healthbar-cells {
  display: flex;
  gap: 3px;
  padding: 4px;
  background: var(--px-surface-2);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-sm);
}
.px-healthbar-cell {
  width: 12px;
  height: 16px;
  background: var(--px-surface);
  border: 1px solid color-mix(in srgb, var(--px-border-color) 35%, transparent);
}
.px-healthbar-cell--full {
  background: var(--px-success);
  border-color: var(--px-border-color);
}
.px-healthbar--hp .px-healthbar-cell--full { background: var(--px-danger); }
.px-healthbar--mp .px-healthbar-cell--full { background: var(--px-info); }
.px-healthbar--xp .px-healthbar-cell--full { background: var(--px-accent-2); }
/* low health: pulse the remaining cells */
.px-healthbar--critical .px-healthbar-cell--full {
  animation: px-blink 0.6s steps(2) infinite;
}
@keyframes px-blink {
  50% { opacity: 0.35; }
}
@media (prefers-reduced-motion: reduce) {
  .px-healthbar--critical .px-healthbar-cell--full { animation: none; }
}

/* ---- Score display ------------------------------------------------------------ */
.px-score {
  display: inline-flex;
  flex-direction: column;
  gap: 4px;
  padding: var(--px-space-3) var(--px-space-4);
  background: var(--px-ink);
  color: var(--px-bg);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
}
.px-score-label {
  font-family: var(--px-font-display);
  font-size: 8px;
  text-transform: uppercase;
  color: var(--px-accent);
}
.px-score-value {
  font-family: var(--px-font-display);
  font-size: 20px;
  font-variant-numeric: tabular-nums;
}
.px-score--surface {
  background: var(--px-surface);
  color: var(--px-ink);
}
.px-score--surface .px-score-label { color: var(--px-accent-2); }

/* ---- Stat (label + value + delta, dashboard flavor) ----------------------------- */
.px-stat {
  padding: var(--px-space-4);
  background: var(--px-surface);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow);
}
.px-stat-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
}
.px-stat-value {
  font-family: var(--px-font-display);
  font-size: 22px;
  margin: 6px 0 4px;
}
.px-stat-delta {
  display: inline-block;
  font-size: 12px;
  font-weight: 800;
  padding: 1px 7px;
  border: var(--px-border-w-thin) solid var(--px-border-color);
}
.px-stat-delta--up { background: var(--px-success); color: var(--px-success-ink); }
.px-stat-delta--down { background: var(--px-danger); color: var(--px-danger-ink); }

/* ---- Splash / intro screen -------------------------------------------------------- */
.px-splash {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--px-space-5);
  padding: var(--px-space-7) var(--px-space-5);
  text-align: center;
  background: var(--px-bg);
  border: var(--px-border-w) solid var(--px-border-color);
  box-shadow: var(--px-shadow-lg);
}
.px-splash-title {
  margin: 0;
  font-family: var(--px-font-display);
  font-size: clamp(20px, 5vw, 36px);
  text-transform: uppercase;
  text-shadow: 4px 4px 0 var(--px-accent);
}
.px-splash-subtitle {
  margin: 0;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--px-ink-muted);
}
.px-splash-prompt {
  font-family: var(--px-font-display);
  font-size: 10px;
  text-transform: uppercase;
  animation: px-blink 1.1s steps(2) infinite;
}
@media (prefers-reduced-motion: reduce) {
  .px-splash-prompt { animation: none; }
}

.preview-root { padding: 28px; display: flex; flex-direction: column; gap: 18px; min-height: 100vh; }
